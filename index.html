const { useState, useCallback, useEffect } = React;

const PARK = {
‘Arizona Diamondbacks’:101,‘Atlanta Braves’:100,‘Baltimore Orioles’:100,

‘Cincinnati Reds’:105,‘Cleveland Guardians’:99,‘Colorado Rockies’:115,

};

// ── LOCAL STORAGE ─────────────────────────────────────────────────────────────
function usePersisted(key, def) {
const [val, setVal] = useState(def);
useEffect(() => {
try { const s = localStorage.getItem(key); if (s !== null) setVal(JSON.parse(s)); } catch(e) {}
}, []);
const set = useCallback((v) => {
setVal(v);
try { localStorage.setItem(key, JSON.stringify(v)); } catch(e) {}
}, [key]);
return [val, set];
}

// ── MLB API ───────────────────────────────────────────────────────────────────
const MLB = ‘https://statsapi.mlb.com/api/v1’;
async function get(path) {
const r = await fetch(MLB + path);
if (!r.ok) throw new Error(’HTTP ’ + r.status);
return r.json();
}
function daysAgo(n) {
const d = new Date(); d.setDate(d.getDate() - n);
return d.toISOString().slice(0,10);
}

async function fetchGames(date) {
const d = await get(’/schedule?sportId=1&date=’ + date + ‘&hydrate=probablePitcher,team,venue,weather’);
if (!d.dates || !d.dates.length) return [];
return d.dates[0].games.map(function(g) {
return {
gamePk: g.gamePk,
venue: g.venue ? g.venue.name : ‘’,
time: g.gameDate ? new Date(g.gameDate).toLocaleTimeString([],{hour:‘2-digit’,minute:‘2-digit’}) : ‘’,
weather: g.weather ? g.weather.temp + ’F, ’ + g.weather.condition + ’, wind ’ + g.weather.wind : null,
away: { id:g.teams.away.team.id, name:g.teams.away.team.name, pitcherId:g.teams.away.probablePitcher ? g.teams.away.probablePitcher.id : null, pitcherName:g.teams.away.probablePitcher ? g.teams.away.probablePitcher.fullName : ‘TBD’ },
home: { id:g.teams.home.team.id, name:g.teams.home.team.name, pitcherId:g.teams.home.probablePitcher ? g.teams.home.probablePitcher.id : null, pitcherName:g.teams.home.probablePitcher ? g.teams.home.probablePitcher.fullName : ‘TBD’ }
};
});
}

async function fetchStarter(pid, yr) {
if (!pid) return null;
try {
const d = await get(’/people/’ + pid + ‘/stats?stats=season&group=pitching&season=’ + yr);
const s = d.stats && d.stats[0] && d.stats[0].splits && d.stats[0].splits[0] ? d.stats[0].splits[0].stat : null;
if (!s) return null;
const ip = parseFloat(s.inningsPitched)||0, hr = parseInt(s.homeRuns)||0;
const bb = parseInt(s.baseOnBalls)||0, hbp = parseInt(s.hitByPitch)||0;
const k = parseInt(s.strikeOuts)||0, gs = parseInt(s.gamesStarted)||1;
const fip = ip > 0 ? ((13*hr)+3*(bb+hbp)-(2*k))/ip+3.15 : null;
const xfip = ip > 0 ? ((13*(1.25*ip/9))+3*(bb+hbp)-(2*k))/ip+3.15 : null;
return {
era: parseFloat(s.era)||4.50, whip: parseFloat(s.whip)||1.35,
k9: parseFloat(s.strikeoutsPer9Inn)||8.5, bb9: parseFloat(s.walksPer9Inn)||3.2,
fip: fip || parseFloat(s.era)*0.95 || 4.30,
xfip: xfip || parseFloat(s.era)*0.93 || 4.20,
ipsPerStart: ip/gs
};
} catch(e) { return null; }
}

async function fetchHitting(id, yr) {
try {
let woba = null, babip = null;
try {
const ds = await get(’/teams/’ + id + ‘/stats?stats=sabermetrics&group=hitting&season=’ + yr);
const ss = ds.stats && ds.stats[0] && ds.stats[0].splits && ds.stats[0].splits[0] ? ds.stats[0].splits[0].stat : null;
if (ss) { woba = parseFloat(ss.wOBA); babip = parseFloat(ss.babip); }
} catch(e) {}
const d = await get(’/teams/’ + id + ‘/stats?stats=season&group=hitting&season=’ + yr);
const s = d.stats && d.stats[0] && d.stats[0].splits && d.stats[0].splits[0] ? d.stats[0].splits[0].stat : null;
if (!s) return null;
const obp = parseFloat(s.obp)||0.320, slg = parseFloat(s.slg)||0.410;
if (!woba || isNaN(woba)) woba = (obp*1.15+slg*0.62)/1.77;
if (!babip || isNaN(babip)) babip = parseFloat(s.babip)||0.295;
return { ba:parseFloat(s.avg)||0.250, obp, slg, woba, babip };
} catch(e) { return null; }
}

async function fetchPitching(id, yr) {
try {
const d = await get(’/teams/’ + id + ‘/stats?stats=season&group=pitching&season=’ + yr);
const s = d.stats && d.stats[0] && d.stats[0].splits && d.stats[0].splits[0] ? d.stats[0].splits[0].stat : null;
if (!s) return null;
const ip=parseFloat(s.inningsPitched)||1000, hr=parseInt(s.homeRuns)||150;
const bb=parseInt(s.baseOnBalls)||450, hbp=parseInt(s.hitByPitch)||60, k=parseInt(s.strikeOuts)||1200;
const fip = ip > 0 ? ((13*hr)+3*(bb+hbp)-(2*k))/ip+3.15 : 4.05;
return {
teamEra:parseFloat(s.era)||4.20, teamWhip:parseFloat(s.whip)||1.28,
teamK9:parseFloat(s.strikeoutsPer9Inn)||8.5, teamFip:fip,
saves:parseInt(s.saves)||25, holds:parseInt(s.holds)||45, blownSaves:parseInt(s.blownSaves)||10
};
} catch(e) { return null; }
}

async function fetchDefense(id, yr) {
try {
const d = await get(’/teams/’ + id + ‘/stats?stats=season&group=fielding&season=’ + yr);
const s = d.stats && d.stats[0] && d.stats[0].splits && d.stats[0].splits[0] ? d.stats[0].splits[0].stat : null;
if (!s) return null;
return { fieldingPct:parseFloat(s.fielding)||0.983, errors:parseInt(s.errors)||80 };
} catch(e) { return null; }
}

async function fetchRecent(id, date) {
try {
const d = await get(’/schedule?teamId=’ + id + ‘&startDate=’ + daysAgo(20) + ‘&endDate=’ + date + ‘&sportId=1’);
const games = (d.dates||[]).flatMap(function(x){ return x.games; })
.filter(function(g){ return g.status && g.status.abstractGameState === ‘Final’; }).slice(-10);
if (!games.length) return { winPct:0.500 };
const wins = games.filter(function(g){ return g.teams.home.team.id===id ? g.teams.home.isWinner : g.teams.away.isWinner; }).length;
return { winPct: wins/games.length };
} catch(e) { return { winPct:0.500 }; }
}

async function fetchStandings(id, yr) {
try {
const d = await get(’/standings?leagueId=103,104&season=’ + yr + ‘&hydrate=team’);
for (const rec of d.records||[]) {
for (const tr of rec.teamRecords||[]) {
if (tr.team.id === id) return {
rdiff: (tr.runsScored||0)-(tr.runsAllowed||0),
pct: parseFloat(tr.winningPercentage)||0.500
};
}
}
return { rdiff:0, pct:0.500 };
} catch(e) { return { rdiff:0, pct:0.500 }; }
}

async function fetchH2H(awayId, homeId, yr) {
try {
const d = await get(’/schedule?sportId=1&season=’ + yr + ‘&teamId=’ + awayId + ‘&opponentId=’ + homeId);
const games = (d.dates||[]).flatMap(function(x){ return x.games; })
.filter(function(g){ return g.status && g.status.abstractGameState === ‘Final’; });
if (games.length < 3) return null;
const awayWins = games.filter(function(g){
return (g.teams.away.team.id===awayId && g.teams.away.isWinner) ||
(g.teams.home.team.id===awayId && g.teams.home.isWinner);
}).length;
return { awayWins, total:games.length, awayPct:awayWins/games.length };
} catch(e) { return null; }
}

async function fetchCompleted(start, end) {
const d = await get(’/schedule?sportId=1&startDate=’ + start + ‘&endDate=’ + end + ‘&hydrate=probablePitcher,team,decisions’);
return (d.dates||[]).flatMap(function(x){ return x.games; })
.filter(function(g){ return g.status && g.status.abstractGameState === ‘Final’; })
.map(function(g) {
return {
gamePk:g.gamePk,
date:(g.officialDate||g.gameDate||’’).slice(0,10),
away:{id:g.teams.away.team.id,name:g.teams.away.team.name,pitcherId:g.teams.away.probablePitcher?g.teams.away.probablePitcher.id:null,pitcherName:g.teams.away.probablePitcher?g.teams.away.probablePitcher.fullName:‘TBD’},
home:{id:g.teams.home.team.id,name:g.teams.home.team.name,pitcherId:g.teams.home.probablePitcher?g.teams.home.probablePitcher.id:null,pitcherName:g.teams.home.probablePitcher?g.teams.home.probablePitcher.fullName:‘TBD’},
actualWinner:g.teams.home.isWinner?g.teams.home.team.name:g.teams.away.isWinner?g.teams.away.team.name:null
};
}).filter(function(g){ return g.actualWinner; });
}

const _cache = {};
async function cachedStats(id, yr) {
const k = id+’-’+yr;
if (_cache[k]) return _cache[k];
const [hit,pit,def,stand] = await Promise.all([fetchHitting(id,yr),fetchPitching(id,yr),fetchDefense(id,yr),fetchStandings(id,yr)]);
_cache[k] = {
hit:hit||{ba:0.250,obp:0.320,slg:0.415,woba:0.315,babip:0.295},
pit, def:def||{fieldingPct:0.983,errors:80}, stand
};
return _cache[k];
}

// ── MODEL ─────────────────────────────────────────────────────────────────────
const AVG_SP   = {era:4.20,whip:1.30,k9:8.8,bb9:3.2,fip:4.05,xfip:4.00,ipsPerStart:5.0};
const AVG_HIT  = {ba:0.250,obp:0.320,slg:0.415,woba:0.315,babip:0.295};
const AVG_PITCH= {teamEra:4.20,teamWhip:1.28,teamK9:8.5,teamFip:4.05,saves:25,holds:45,blownSaves:10};
const AVG_DEF  = {fieldingPct:0.983,errors:80};
const AVG_STAND= {rdiff:0,pct:0.500};
const AVG_REC  = {winPct:0.500};

function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
function fromLO(lo){ return 1/(1+Math.exp(-lo)); }

function blend(sp, tp) {
const S=sp||AVG_SP, T=tp||AVG_PITCH;
const spInn=clamp(S.ipsPerStart||5.0,3.5,7.0), bpInn=9-spInn;
const bpEra =clamp((T.teamEra*9 -S.era*spInn) /bpInn,2.5,7.5);
const bpWhip=clamp((T.teamWhip*9-S.whip*spInn)/bpInn,0.9,2.2);
const bpK9  =clamp((T.teamK9*9  -S.k9*spInn)  /bpInn,5.0,14.0);
const bpFip =clamp((T.teamFip*9 -S.fip*spInn) /bpInn,2.5,7.5);
const bsv=T.saves+T.blownSaves;
return {
spInn, bpInn,
starterEra:S.era,starterWhip:S.whip,starterK9:S.k9,
starterFip:S.fip,starterXfip:S.xfip,starterBb9:S.bb9,
bullpenEra:bpEra,bullpenWhip:bpWhip,bullpenFip:bpFip,
blendedEra: (S.era*spInn +bpEra*bpInn) /9,
blendedWhip:(S.whip*spInn+bpWhip*bpInn)/9,
blendedK9:  (S.k9*spInn  +bpK9*bpInn)  /9,
blendedFip: (S.fip*spInn +bpFip*bpInn) /9,
bullpenDepth:(T.saves+T.holds)/70,
svPct:bsv>0?T.saves/bsv:0.70
};
}

function mlToDecimal(ml) {
const n=parseInt(ml);
return n>0?(n/100)+1:(100/Math.abs(n))+1;
}
function mlToImplied(ml) {
if(!ml) return null;
const n=parseInt(ml);
if(isNaN(n)) return null;
return n>0?100/(n+100):Math.abs(n)/(Math.abs(n)+100);
}
function calcEdge(modelP, bookML) {
const p=mlToImplied(bookML);
return p!==null?modelP-p:null;
}
function kelly(p, ml, frac) {
frac=frac||0.25;
const b=mlToDecimal(ml)-1, q=1-p;
return Math.max(0,((b*p-q)/b)*frac);
}

function runModel(A, B, h2h) {
const pfB=(PARK[B.name]||100)/100, pfA=(PARK[A.name]||100)/100;
const aWoba=(A.hit.woba/pfA)*pfB, bWoba=(B.hit.woba/pfA)*pfB;
const aLuck=(A.hit.babip-0.295)*0.5, bLuck=(B.hit.babip-0.295)*0.5;
const aDefScore=(A.def.fieldingPct-0.983)*50-(A.def.errors-80)*0.003;
const bDefScore=(B.def.fieldingPct-0.983)*50-(B.def.errors-80)*0.003;
const aBpRel=(A.pitch.svPct-0.70)*0.3, bBpRel=(B.pitch.svPct-0.70)*0.3;

let lo=0;
lo+=(B.pitch.blendedFip -A.pitch.blendedFip) *0.24;
lo+=(B.pitch.blendedWhip-A.pitch.blendedWhip)*0.20;
lo+=(A.pitch.blendedK9  -B.pitch.blendedK9)  *0.04;
lo+=(A.pitch.starterBb9 -B.pitch.starterBb9) *0.06;
lo+=aBpRel-bBpRel;
lo+=(A.pitch.bullpenDepth-B.pitch.bullpenDepth)*0.10;
lo+=(aWoba-bWoba)*4.2;
lo+=(A.hit.slg-B.hit.slg)*0.8;
lo-=(aLuck-bLuck);
lo+=(aDefScore-bDefScore)*0.08;
lo-=0.16;
lo+=(A.stand.rdiff-B.stand.rdiff)*0.005;
lo+=(A.recent.winPct-B.recent.winPct)*0.50;
lo+=(A.stand.pct-B.stand.pct)*0.30;
if(h2h&&h2h.total>=3) lo+=(h2h.awayPct-0.500)*0.20;
lo+=((PARK[B.name]||100)-100)*0.004;

const pA=clamp(fromLO(lo),0.22,0.78), pB=1-pA;
const ml=function(p){ return p>=0.5?’-’+Math.round(p/(1-p)*100):’+’+Math.round((1-p)/p*100); };
const rA=Math.max(1,Math.round(aWoba*14-B.pitch.blendedFip*0.30));
const rB=Math.max(1,Math.round(bWoba*14-A.pitch.blendedFip*0.30));
const winner=pA>=pB?A.name:B.name;

const factors=[
{label:‘Blended FIP’,   aVal:A.pitch.blendedFip.toFixed(2),  bVal:B.pitch.blendedFip.toFixed(2),  delta:(B.pitch.blendedFip-A.pitch.blendedFip)*0.24},
{label:‘Blended WHIP’,  aVal:A.pitch.blendedWhip.toFixed(2), bVal:B.pitch.blendedWhip.toFixed(2), delta:(B.pitch.blendedWhip-A.pitch.blendedWhip)*0.20},
{label:‘BB/9’,          aVal:A.pitch.starterBb9.toFixed(1),  bVal:B.pitch.starterBb9.toFixed(1),  delta:(A.pitch.starterBb9-B.pitch.starterBb9)*0.06},
{label:‘K/9’,           aVal:A.pitch.blendedK9.toFixed(1),   bVal:B.pitch.blendedK9.toFixed(1),   delta:(A.pitch.blendedK9-B.pitch.blendedK9)*0.04},
{label:‘Bullpen Depth’, aVal:Math.round(A.pitch.bullpenDepth*70)+’’, bVal:Math.round(B.pitch.bullpenDepth*70)+’’, delta:(A.pitch.bullpenDepth-B.pitch.bullpenDepth)*0.10},
{label:‘Save %’,        aVal:(A.pitch.svPct*100).toFixed(0)+’%’, bVal:(B.pitch.svPct*100).toFixed(0)+’%’, delta:aBpRel-bBpRel},
{label:‘wOBA (park-adj)’,aVal:aWoba.toFixed(3),               bVal:bWoba.toFixed(3),               delta:(aWoba-bWoba)*4.2},
{label:‘Team SLG’,      aVal:A.hit.slg.toFixed(3),            bVal:B.hit.slg.toFixed(3),           delta:(A.hit.slg-B.hit.slg)*0.8},
{label:‘BABIP luck’,    aVal:A.hit.babip.toFixed(3),          bVal:B.hit.babip.toFixed(3),         delta:-(aLuck-bLuck)},
{label:‘Home Field’,    aVal:‘Away’,                           bVal:‘Home’,                         delta:-0.16},
{label:‘Park Factor’,   aVal:’’+(PARK[A.name]||100),          bVal:(PARK[B.name]||100)+’ (home)’,  delta:((PARK[B.name]||100)-100)*0.004},
{label:‘Season Win%’,   aVal:((A.stand.pct*1000)|0)/10+’%’,   bVal:((B.stand.pct*1000)|0)/10+’%’, delta:(A.stand.pct-B.stand.pct)*0.30},
{label:‘Recent L10’,    aVal:Math.round(A.recent.winPct*10)+’-’+Math.round((1-A.recent.winPct)*10), bVal:Math.round(B.recent.winPct*10)+’-’+Math.round((1-B.recent.winPct)*10), delta:(A.recent.winPct-B.recent.winPct)*0.50},
{label:‘Run Diff’,      aVal:(A.stand.rdiff>=0?’+’:’’)+A.stand.rdiff, bVal:(B.stand.rdiff>=0?’+’:’’)+B.stand.rdiff, delta:(A.stand.rdiff-B.stand.rdiff)*0.005},
h2h&&h2h.total>=3?{label:‘Head-to-Head’,aVal:h2h.awayWins+’-’+(h2h.total-h2h.awayWins)+’ away’,bVal:(h2h.total-h2h.awayWins)+’-’+h2h.awayWins+’ home’,delta:(h2h.awayPct-0.5)*0.20}:null
].filter(Boolean).sort(function(x,y){return Math.abs(y.delta)-Math.abs(x.delta);});

return {
pctA:Math.round(pA*100),pctB:Math.round(pB*100),
mlA:ml(pA),mlB:ml(pB),
ou:(rA+rB+0.5).toFixed(1),
confidence:Math.abs(pA-0.5)>0.15?‘High’:Math.abs(pA-0.5)>0.07?‘Medium’:‘Low’,
winner,winnerP:pA>=pB?pA:pB,winnerML:pA>=pB?ml(pA):ml(pB),
projScore:pA>=pB?(Math.max(rA,rB)+’–’+Math.min(rA,rB)):(Math.min(rA,rB)+’–’+Math.max(rA,rB)),
factors,aName:A.name,bName:B.name,
aPitcher:A.pitcherName,bPitcher:B.pitcherName,
aBlend:A.pitch,bBlend:B.pitch,
parkB:PARK[B.name]||100,h2h
};
}

function buildParlays(results, bookOdds, minEdgePct) {
bookOdds=bookOdds||{};
minEdgePct=minEdgePct||2;
const minEdge=minEdgePct/100;

const edgy=results
.filter(function(r){return r.winnerP>=0.54;})
.map(function(r){
const bookML=bookOdds[r.gamePk]||null;
const edge=bookML?calcEdge(r.winnerP,bookML):null;
const hasEdge=edge!==null?edge>=minEdge:true;
const effectiveML=bookML||r.winnerML;
return Object.assign({},r,{bookML,edge,hasEdge,effectiveML,kellyPct:kelly(r.winnerP,effectiveML)*100});
})
.filter(function(r){return r.hasEdge;})
.sort(function(a,b){
const ea=a.edge!==null?a.edge:Math.abs(a.winnerP-0.5)*0.2;
const eb=b.edge!==null?b.edge:Math.abs(b.winnerP-0.5)*0.2;
return eb-ea;
});

const singles=edgy.slice(0,3).map(function(r){
return {legs:[r],type:‘Single’,combinedP:r.winnerP,payout:mlToDecimal(r.effectiveML),kellyPct:r.kellyPct,combinedEdge:r.edge};
});

const top4=edgy.slice(0,4), parlays2=[];
for(let i=0;i<top4.length;i++) for(let j=i+1;j<top4.length;j++){
const a=top4[i],b=top4[j];
if(a.gamePk===b.gamePk) continue;
const combinedP=a.winnerP*b.winnerP;
const payout=mlToDecimal(a.effectiveML)*mlToDecimal(b.effectiveML);
const kPct=kelly(combinedP,’+’+Math.round((payout-1)*100))*100;
const combinedEdge=(a.edge!==null&&b.edge!==null)?(a.edge+b.edge)/2:null;
parlays2.push({legs:[a,b],type:‘2-Leg Parlay’,combinedP,payout,kellyPct:kPct,combinedEdge});
}
parlays2.sort(function(a,b){
const ea=a.combinedEdge!==null?a.combinedEdge:a.combinedP;
const eb=b.combinedEdge!==null?b.combinedEdge:b.combinedP;
return eb-ea;
});

const parlays3=[], top3=edgy.slice(0,3);
if(top3.length===3){
const [a,b,c]=top3;
if(a.gamePk!==b.gamePk&&b.gamePk!==c.gamePk&&a.gamePk!==c.gamePk){
const combinedP=a.winnerP*b.winnerP*c.winnerP;
const payout=mlToDecimal(a.effectiveML)*mlToDecimal(b.effectiveML)*mlToDecimal(c.effectiveML);
const kPct=kelly(combinedP,’+’+Math.round((payout-1)*100))*100;
const combinedEdge=(a.edge!==null&&b.edge!==null&&c.edge!==null)?(a.edge+b.edge+c.edge)/3:null;
parlays3.push({legs:[a,b,c],type:‘3-Leg Parlay’,combinedP,payout,kellyPct:kPct,combinedEdge});
}
}
return {singles,parlays2:parlays2.slice(0,2),parlays3,edgeFiltered:edgy.length};
}

function computeBacktest(results, bankroll) {
function record(arr){
if(!arr.length) return {w:0,l:0,pct:null};
const w=arr.filter(function(r){return r.correct;}).length;
return {w,l:arr.length-w,pct:(w/arr.length*100).toFixed(1)};
}
let bankSim=bankroll,peak=bankroll,maxDD=0;
const equity=[bankroll];
results.forEach(function(r){
const k=kelly(r.winnerP,r.winnerML)*bankSim;
const gain=r.correct?k*(mlToDecimal(r.winnerML)-1):-k;
bankSim=Math.max(1,bankSim+gain);
peak=Math.max(peak,bankSim);
maxDD=Math.max(maxDD,(peak-bankSim)/peak*100);
equity.push(parseFloat(bankSim.toFixed(2)));
});
const buckets=[
{label:‘54-58%’,lo:0.54,hi:0.58},{label:‘58-62%’,lo:0.58,hi:0.62},
{label:‘62-66%’,lo:0.62,hi:0.66},{label:‘66-70%’,lo:0.66,hi:0.70},
{label:‘70%+’,lo:0.70,hi:1.00}
].map(function(b){
const gs=results.filter(function(r){return r.winnerP>=b.lo&&r.winnerP<b.hi;});
const wins=gs.filter(function(r){return r.correct;}).length;
return Object.assign({},b,{games:gs.length,wins,actualPct:gs.length?(wins/gs.length*100).toFixed(1):null});
});
const byDate={};
results.forEach(function(r){if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r);});
let p1Bank=bankroll,p2Bank=bankroll,p3Bank=bankroll;
const p1Eq=[bankroll],p2Eq=[bankroll],p3Eq=[bankroll];
const parlayDays=[];
Object.keys(byDate).sort().forEach(function(date){
const plays=buildParlays(byDate[date]);
const s=plays.singles[0],p2=plays.parlays2[0],p3=plays.parlays3[0];
if(s){
const k=kelly(s.combinedP,s.legs[0].winnerML)*p1Bank;
p1Bank=Math.max(1,p1Bank+(s.legs[0].correct?k*(mlToDecimal(s.legs[0].winnerML)-1):-k));
p1Eq.push(parseFloat(p1Bank.toFixed(2)));
}
if(p2){
const odds=p2.legs.reduce(function(a,l){return a*mlToDecimal(l.winnerML);},1);
const k=kelly(p2.combinedP,’+’+Math.round((odds-1)*100))*p2Bank;
p2Bank=Math.max(1,p2Bank+(p2.legs.every(function(l){return l.correct;})?k*(odds-1):-k));
p2Eq.push(parseFloat(p2Bank.toFixed(2)));
}
if(p3){
const odds=p3.legs.reduce(function(a,l){return a*mlToDecimal(l.winnerML);},1);
const k=kelly(p3.combinedP,’+’+Math.round((odds-1)*100))*p3Bank;
p3Bank=Math.max(1,p3Bank+(p3.legs.every(function(l){return l.correct;})?k*(odds-1):-k));
p3Eq.push(parseFloat(p3Bank.toFixed(2)));
}
parlayDays.push({
date,
single:s?{hit:s.legs[0].correct,label:s.legs[0].winner,combinedP:s.combinedP}:null,
parlay2:p2?{hit:p2.legs.every(function(l){return l.correct;}),label:p2.legs.map(function(l){return l.winner;}).join(’ + ‘),combinedP:p2.combinedP}:null,
parlay3:p3?{hit:p3.legs.every(function(l){return l.correct;}),label:p3.legs.map(function(l){return l.winner;}).join(’ + ’),combinedP:p3.combinedP}:null
});
});
function parlayRec(days,key){
const played=days.filter(function(d){return d[key];});
const won=played.filter(function(d){return d[key].hit;});
return {w:won.length,l:played.length-won.length,pct:played.length?(won.length/played.length*100).toFixed(1):null,played:played.length};
}
return {
all:record(results),high:record(results.filter(function(r){return r.confidence===‘High’;})),
medium:record(results.filter(function(r){return r.confidence===‘Medium’;})),
low:record(results.filter(function(r){return r.confidence===‘Low’;})),
roi:((bankSim-bankroll)/bankroll*100).toFixed(1),
finalBank:bankSim.toFixed(0),maxDD:maxDD.toFixed(1),
equity,calibration:buckets,bets:results,
parlayDays,
p1Record:parlayRec(parlayDays,‘single’),p2Record:parlayRec(parlayDays,‘parlay2’),p3Record:parlayRec(parlayDays,‘parlay3’),
p1Bank:p1Bank.toFixed(0),p2Bank:p2Bank.toFixed(0),p3Bank:p3Bank.toFixed(0),
p1Eq,p2Eq,p3Eq,
p1Roi:((p1Bank-bankroll)/bankroll*100).toFixed(1),
p2Roi:((p2Bank-bankroll)/bankroll*100).toFixed(1),
p3Roi:((p3Bank-bankroll)/bankroll*100).toFixed(1)
};
}

async function analyzeGame(game, date) {
const yr=date.slice(0,4);

fetchStarter(game.away.pitcherId,yr),fetchStarter(game.home.pitcherId,yr),
fetchHitting(game.away.id,yr),fetchHitting(game.home.id,yr),
fetchPitching(game.away.id,yr),fetchPitching(game.home.id,yr),
fetchDefense(game.away.id,yr),fetchDefense(game.home.id,yr),
fetchRecent(game.away.id,date),fetchRecent(game.home.id,date),
fetchStandings(game.away.id,yr),fetchStandings(game.home.id,yr),
fetchH2H(game.away.id,game.home.id,yr)
]);
const A={name:game.away.name,pitcherName:game.away.pitcherName,pitch:blend(sA,pA),hit:hA||AVG_HIT,def:dA||AVG_DEF,recent:rA||AVG_REC,stand:stA||AVG_STAND};
const B={name:game.home.name,pitcherName:game.home.pitcherName,pitch:blend(sB,pB),hit:hB||AVG_HIT,def:dB||AVG_DEF,recent:rB||AVG_REC,stand:stB||AVG_STAND};
return Object.assign({},runModel(A,B,h2h),{weather:game.weather,venue:game.venue,time:game.time,gamePk:game.gamePk});
}

async function analyzeGameCached(game, yr) {

fetchStarter(game.away.pitcherId,yr),fetchStarter(game.home.pitcherId,yr),

fetchRecent(game.away.id,game.date),fetchRecent(game.home.id,game.date),

]);
const A={name:game.away.name,pitcherName:game.away.pitcherName,pitch:blend(sA,csA.pit),hit:csA.hit,def:csA.def,recent:rA||AVG_REC,stand:csA.stand||AVG_STAND};

              {loading&&<Spinner/>}{loading?'Analyzing...':'Analyze All'}

        {results.length>0&&(

                return (
                  <div key={i} style={{background:'rgba(255,255,255,0.02)',border:'1px solid '+C.border,borderRadius:8,padding:'10px 12px'}}>
                    <div onClick={function(){viewGame(r);}} style={{cursor:'pointer'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                        <div style={{flex:1}}>
                          <span style={{fontSize:13,fontWeight:700,color:C.goldLight}}>{r.winner}</span>
                          <span style={{fontSize:11,color:C.muted,margin:'0 6px'}}>def.</span>

                      <div style={{marginTop:3,fontSize:10,color:C.muted}}>{r.time} · O/U {r.ou}</div>

                    <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8}} onClick={function(e){e.stopPropagation();}}>

                      <input placeholder="+110" value={bookOdds[r.gamePk]||''} onChange={function(e){setBookOdds(function(prev){const n=Object.assign({},prev);n[r.gamePk]=e.target.value;return n;});}}
                        style={{width:64,background:'#0a0907',border:'1px solid '+(bookOdds[r.gamePk]?'#3a5a3a':C.dim),borderRadius:4,color:bookOdds[r.gamePk]?'#5aba8a':C.muted,fontSize:11,padding:'3px 6px',outline:'none',fontFamily:'monospace',textAlign:'center'}}/>
                      {edge!==null&&<span style={{fontSize:10,fontWeight:700,color:edge>=0.05?'#5aba8a':edge>=0.02?'#8aba5a':edge>=0?'#c0c060':'#c06060',fontFamily:'monospace'}}>{edge>=0?'+':''}{(edge*100).toFixed(1)}%</span>}

                  </div>

              })}
            </div>
          </Card>

      </div>

    {tab===1&&(
      <div className="fadein">
        {!detail?(
          <Card style={{textAlign:'center',padding:32}}>
            <div style={{fontSize:32,marginBottom:10}}>🔍</div>
            <div style={{color:C.muted}}>Select a game from Daily Board.</div>
          </Card>
        ):(function(){
          const r=detail;
          const bookML=bookOdds[r.gamePk]||null;
          const effectiveML=bookML||r.winnerML;
          const edge=bookML?calcEdge(r.winnerP,bookML):null;
          const k=kelly(r.winnerP,effectiveML)*100;
          const stake=(k/100*bankroll).toFixed(2);
          const win=((mlToDecimal(effectiveML)-1)*parseFloat(stake)).toFixed(2);
          return (
            <div>
              {(r.venue||r.weather)&&(
                <div style={{marginBottom:12,padding:'8px 14px',background:'rgba(255,255,255,0.02)',border:'1px solid '+C.border,borderRadius:8,display:'flex',gap:12,flexWrap:'wrap'}}>
                  {r.venue&&<span style={{fontSize:11,color:C.muted}}>🏟 {r.venue}</span>}
                  {r.weather&&<span style={{fontSize:11,color:'#3a4a2a'}}>🌡 {r.weather}</span>}
                  <span style={{fontSize:11,color:'#2a3a2a'}}>Park {r.parkB}</span>
                </div>

              <Card style={{marginBottom:12}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:12,alignItems:'center',marginBottom:18}}>

                    <div style={{fontSize:9,color:r.winner===r.aName?C.gold:'#333',textTransform:'uppercase',letterSpacing:2,marginTop:2}}>{r.winner===r.aName?'PREDICTED WINNER':'UNDERDOG'}</div>
                    <div style={{fontSize:10,color:'#4a3a1a',marginTop:3}}>SP: {r.aPitcher}</div>
                  </div>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:9,color:C.dim,letterSpacing:4}}>VS</div>
                    <div style={{fontSize:12,color:'#555',fontFamily:'monospace',marginTop:3}}>{r.projScore}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:17,fontFamily:'Georgia,serif',fontWeight:900,color:r.winner===r.bName?C.goldLight:'#555'}}>{r.bName}</div>
                    <div style={{fontSize:9,color:r.winner===r.bName?C.gold:'#333',textTransform:'uppercase',letterSpacing:2,marginTop:2}}>{r.winner===r.bName?'PREDICTED WINNER':'UNDERDOG'}</div>
                    <div style={{fontSize:10,color:'#3a3a4a',marginTop:3}}>SP: {r.bPitcher}</div>
                  </div>
                </div>
                <WinBar pA={r.pctA} pB={r.pctB} nameA={r.aName} nameB={r.bName}/>
              </Card>
              <Card style={{marginBottom:12}}>
                <Lbl>Full-Game Pitching</Lbl>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  <PitchCard name={r.aName} p={r.aBlend} pitcher={r.aPitcher}/>
                  <PitchCard name={r.bName} p={r.bBlend} pitcher={r.bPitcher}/>
                </div>
              </Card>
              <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
                <Chip label={r.aName.split(' ').pop()+' ML'} val={r.mlA} gold={r.winner===r.aName}/>
                <Chip label={r.bName.split(' ').pop()+' ML'} val={r.mlB} gold={r.winner===r.bName}/>
                <Chip label="O/U" val={r.ou}/>
                <Chip label="Confidence" val={r.confidence} gold={r.confidence==='High'}/>
              </div>
              <Card style={{marginBottom:12}}>
                <Lbl>Factor Breakdown</Lbl>
                {r.factors.map(function(f,i){return <FactorRow key={i} f={f}/>;})}<br/>
                <div style={{display:'flex',gap:12,fontSize:10,color:'#444'}}>
                  <span>■ <span style={{color:C.gold}}>{r.aName}</span></span>
                  <span>■ <span style={{color:C.blue}}>{r.bName}</span></span>
                </div>
              </Card>
              <Card>
                <Lbl color="#5aba8a">Kelly Stake</Lbl>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <div style={{background:'rgba(58,138,90,0.06)',border:'1px solid '+C.green,borderRadius:8,padding:'12px 14px'}}>
                    <div style={{fontSize:9,color:C.muted,letterSpacing:2,textTransform:'uppercase',marginBottom:6}}>Recommended</div>

                    <div style={{fontSize:10,color:C.muted,marginTop:2}}>{k.toFixed(1)}% of ${bankroll}</div>

                  <div style={{background:'rgba(255,255,255,0.02)',border:'1px solid '+C.dim,borderRadius:8,padding:'12px 14px'}}>
                    <div style={{fontSize:9,color:C.muted,letterSpacing:2,textTransform:'uppercase',marginBottom:6}}>If Win</div>
                    <div style={{fontSize:22,fontWeight:900,fontFamily:'monospace',color:C.gold}}>+${win}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:2}}>{r.winner} · {effectiveML}</div>
                    <div style={{fontSize:10,color:C.dim,marginTop:1}}>{(r.winnerP*100).toFixed(1)}% model</div>
                  </div>
                </div>
              </Card>
            </div>
          );
        })()}
      </div>
    )}

    {tab===2&&(
      <div className="fadein">
        <Card style={{marginBottom:14}}>
          <Lbl color="#5aba8a">Value Filter</Lbl>

            {parlays.parlays3.length>0&&<div><div style={{fontSize:10,letterSpacing:3,color:'#9a5ac0',textTransform:'uppercase',marginBottom:8,marginTop:16}}>3-Leg Parlay</div>{parlays.parlays3.map(function(p,i){return <ParlayCard key={i} play={p} bankroll={bankroll} onView={viewGame}/>;})}</div>}
            {parlays.singles.length===0&&<Card style={{textAlign:'center',padding:24}}><div style={{color:C.muted}}>No qualifying plays. Lower edge threshold or enter book odds.</div></Card>}
            <div style={{marginTop:20,padding:'12px 14px',background:'rgba(138,58,58,0.06)',border:'1px solid #3a1a1a',borderRadius:8}}><div style={{fontSize:10,color:'#6a3a3a',lineHeight:1.7}}>For entertainment only. Not financial advice.</div></div>
          </div>
        )}
      </div>
    )}

    {tab===3&&(
      <div className="fadein">
        <Card style={{marginBottom:14}}>
          <Lbl>Backtest Range</Lbl>

          <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'flex-end'}}>
            <div style={{flex:'1 1 120px'}}>
              <div style={{fontSize:9,color:C.dim,letterSpacing:2,marginBottom:3}}>FROM</div>
              <input type="date" value={btStart} onChange={function(e){setBtStart(e.target.value);}} style={{width:'100%',background:'#0a0907',border:'1px solid '+C.border,borderRadius:6,color:C.text,fontSize:13,padding:'8px 10px',outline:'none',fontFamily:'monospace'}}/>
            </div>
            <div style={{flex:'1 1 120px'}}>
              <div style={{fontSize:9,color:C.dim,letterSpacing:2,marginBottom:3}}>TO</div>
              <input type="date" value={btEnd} onChange={function(e){setBtEnd(e.target.value);}} style={{width:'100%',background:'#0a0907',border:'1px solid '+C.border,borderRadius:6,color:C.text,fontSize:13,padding:'8px 10px',outline:'none',fontFamily:'monospace'}}/>
            </div>
            <button onClick={runBacktest} disabled={btLoading} style={{padding:'9px 16px',borderRadius:6,border:'none',background:btLoading?C.dim:'linear-gradient(135deg,#c8922a,#9a6e18)',color:btLoading?C.muted:'#080600',fontWeight:900,fontSize:12,letterSpacing:2,textTransform:'uppercase',cursor:btLoading?'not-allowed':'pointer',display:'flex',alignItems:'center',gap:8}}>
              {btLoading&&<Spinner/>}{btLoading?'Running...':'Run Backtest'}
            </button>
          </div>
          {btLoading&&<div style={{marginTop:10,fontSize:11,color:C.muted,display:'flex',gap:8,alignItems:'center'}}><Spinner/>{btProgress}</div>}
        </Card>

        {btError&&<div style={{marginBottom:14,background:'#1a0a0a',border:'1px solid #4a1a1a',borderRadius:6,padding:12,color:'#c06060',fontSize:12,fontFamily:'monospace'}}>{btError}</div>}

        {btResults&&(function(){
          const bt=btResults;
          return (
            <div>
              <div style={{fontSize:10,letterSpacing:3,color:C.gold,textTransform:'uppercase',marginBottom:8}}>Individual Game Accuracy</div>
              <Card style={{marginBottom:12}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,marginBottom:10}}>
                  {[['Overall',bt.all,C.text],['High',bt.high,C.gold],['Medium',bt.medium,'#8a8a3a'],['Low',bt.low,C.muted]].map(function(item){
                    return (
                      <div key={item[0]} style={{background:'rgba(255,255,255,0.02)',border:'1px solid '+C.dim,borderRadius:8,padding:'10px 6px',textAlign:'center'}}>
                        <div style={{fontSize:9,color:C.dim,letterSpacing:2,textTransform:'uppercase',marginBottom:4}}>{item[0]}</div>
                        <div style={{fontSize:18,fontWeight:900,fontFamily:'monospace',color:item[2]}}>{item[1].pct!==null?item[1].pct+'%':'—'}</div>
                        <div style={{fontSize:10,color:C.muted,marginTop:2}}>{item[1].w}-{item[1].l}</div>
                      </div>
                    );
                  })}
                </div>
                <Lbl>Calibration</Lbl>
                <div style={{display:'flex',flexDirection:'column',gap:3}}>
                  {bt.calibration.map(function(b,i){
                    if(!b.games) return null;
                    const actual=parseFloat(b.actualPct);
                    const mid=(b.lo+Math.min(b.hi,0.75))/2*100;
                    const diff=actual-mid;
                    const col=Math.abs(diff)<5?'#5aba8a':Math.abs(diff)<10?'#8a8a3a':'#c06060';
                    return (
                      <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 8px',background:'rgba(255,255,255,0.02)',borderRadius:5,border:'1px solid '+C.dim}}>
                        <span style={{fontSize:10,color:C.muted,width:55,flexShrink:0}}>{b.label}</span>
                        <span style={{fontSize:10,color:C.dim,width:48,flexShrink:0}}>{b.games} games</span>
                        <div style={{flex:1,height:5,background:C.dim,borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',width:(b.actualPct||0)+'%',background:'#5a9ac0',borderRadius:2}}/></div>
                        <span style={{fontSize:11,fontFamily:'monospace',color:'#5a9ac0',width:38,textAlign:'right',flexShrink:0}}>{b.actualPct}%</span>
                        <span style={{fontSize:10,fontFamily:'monospace',color:col,width:40,textAlign:'right',flexShrink:0}}>{diff>0?'+':''}{diff.toFixed(1)}</span>
                      </div>
                    );
                  })}
                </div>
              </Card>

              <div style={{fontSize:10,letterSpacing:3,color:'#5a9ac0',textTransform:'uppercase',marginBottom:8}}>Day-by-Day Parlay Record</div>
              <Card style={{marginBottom:12}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
                  {[['Single',bt.p1Record,C.gold,bt.p1Roi],['2-Leg',bt.p2Record,'#5a9ac0',bt.p2Roi],['3-Leg',bt.p3Record,'#9a5ac0',bt.p3Roi]].map(function(item){
                    return (
                      <div key={item[0]} style={{background:'rgba(255,255,255,0.02)',border:'1px solid '+item[2]+'44',borderRadius:8,padding:'10px 8px',textAlign:'center'}}>
                        <div style={{fontSize:9,color:item[2],letterSpacing:2,textTransform:'uppercase',marginBottom:4}}>{item[0]}</div>
                        <div style={{fontSize:18,fontWeight:900,fontFamily:'monospace',color:item[1].pct!==null&&parseFloat(item[1].pct)>50?'#5aba8a':'#c06060'}}>{item[1].pct!==null?item[1].pct+'%':'—'}</div>
                        <div style={{fontSize:10,color:C.muted,marginTop:2}}>{item[1].w}-{item[1].l}</div>
                        <div style={{fontSize:10,fontFamily:'monospace',color:parseFloat(item[3])>=0?'#5aba8a':'#c06060',marginTop:4}}>ROI {item[3]}%</div>
                      </div>
                    );
                  })}
                </div>
                <Lbl>Parlay Log</Lbl>
                <div style={{display:'flex',flexDirection:'column',gap:5,maxHeight:360,overflowY:'auto'}}>
                  {bt.parlayDays.slice().reverse().map(function(day,i){
                    return (
                      <div key={i} style={{background:'rgba(255,255,255,0.02)',border:'1px solid '+C.dim,borderRadius:7,padding:'8px 10px'}}>
                        <div style={{fontSize:10,color:C.muted,fontFamily:'monospace',marginBottom:6,fontWeight:700}}>{day.date}</div>
                        {[{key:'single',label:'1-Leg',col:C.gold},{key:'parlay2',label:'2-Leg',col:'#5a9ac0'},{key:'parlay3',label:'3-Leg',col:'#9a5ac0'}].map(function(item){
                          const p=day[item.key]; if(!p) return null;
                          return (
                            <div key={item.key} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 8px',background:p.hit?'rgba(58,138,90,0.07)':'rgba(138,58,58,0.07)',borderRadius:4,border:'1px solid '+(p.hit?'#1a3a2a':'#3a1a1a'),marginBottom:3}}>
                              <span style={{fontSize:9,fontWeight:700,color:item.col,width:32,flexShrink:0}}>{item.label}</span>
                              <span style={{fontSize:10,color:p.hit?C.goldLight:'#777',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.label}</span>
                              <span style={{fontSize:10,color:p.hit?'#5aba8a':'#c06060',flexShrink:0}}>{p.hit?'HIT':'MISS'}</span>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              </Card>

              <Card>
                <Lbl>Game Log ({bt.bets.length} games)</Lbl>
                <div style={{display:'flex',flexDirection:'column',gap:3,maxHeight:300,overflowY:'auto'}}>
                  {bt.bets.slice().reverse().map(function(r,i){
                    return (
                      <div key={i} style={{display:'flex',alignItems:'center',gap:7,padding:'5px 9px',background:r.correct?'rgba(58,138,90,0.06)':'rgba(138,58,58,0.06)',borderRadius:5,border:'1px solid '+(r.correct?'#1a3a2a':'#3a1a1a'),flexWrap:'wrap'}}>
                        <span style={{fontSize:9,color:C.dim,width:70,flexShrink:0,fontFamily:'monospace'}}>{r.date}</span>
                        <span style={{fontSize:10,color:r.correct?C.goldLight:'#888',flex:1,fontWeight:r.correct?700:400}}>{r.winner}</span>
                        <span style={{fontSize:9,color:r.correct?'#3a6a3a':'#6a3a3a',flexShrink:0}}>{r.correct?'✓':'✗'} {r.actualWinner?r.actualWinner.split(' ').pop():''}</span>

                      </div>
                    );
                  })}
                </div>
              </Card>
            </div>
          );
        })()}
      </div>
    )}

  </div>
</div>
