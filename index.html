<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diamond Market</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0b09;color:#c8b890;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding-bottom:80px}
input,select,button{font-family:inherit}
input[type=date],input[type=number]{color-scheme:dark}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #2e2416;border-top-color:#c8922a;border-radius:50%;animation:spin .8s linear infinite}
.card{background:#111009;border:1px solid #252015;border-radius:10px;padding:16px 18px;margin-bottom:12px}
.lbl{font-size:9px;letter-spacing:3px;color:#6a5a3a;text-transform:uppercase;margin-bottom:8px}
.tabs{display:flex;border-bottom:1px solid #252015;background:#090806;position:sticky;top:0;z-index:10;overflow-x:auto}
.tab{flex:0 0 auto;padding:11px 10px;border:none;background:transparent;color:#6a5a3a;font-size:10px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:#c8922a;border-bottom-color:#c8922a;font-weight:700}
.panel{display:none;max-width:820px;margin:0 auto;padding:14px 12px}
.panel.active{display:block}
.win-bar{display:flex;height:32px;border-radius:4px;overflow:hidden;border:1px solid #252015;margin-top:6px}
.win-a{background:linear-gradient(90deg,#b07820,#d4a030);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#1a1000;font-family:monospace}
.win-b{background:linear-gradient(90deg,#2a5070,#3a6a9a);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#c0d8f0;font-family:monospace}
.chip{border:1px solid #252015;background:rgba(255,255,255,.02);border-radius:6px;padding:8px 10px;text-align:center;flex:1 1 70px}
.chip.gold{border-color:#c8922a;background:rgba(200,146,42,.08)}
.chip .cl{font-size:9px;color:#6a5a3a;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.chip .cv{font-size:16px;font-weight:900;color:#c8b890;font-family:monospace}
.chip.gold .cv{color:#e0b040}
.factor{padding:7px 0;border-bottom:1px solid #2e2416}
.fbar{height:3px;background:#2e2416;border-radius:2px;margin-top:3px;position:relative}
.fbar-fill{height:100%;border-radius:2px;position:absolute}
.game-row{background:rgba(255,255,255,.02);border:1px solid #252015;border-radius:8px;padding:10px 12px;margin-bottom:6px}
.parlay-card{border-radius:10px;padding:14px 16px;margin-bottom:10px}
.parlay-leg{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:rgba(255,255,255,.02);border-radius:6px;margin-bottom:6px;border:1px solid #2e2416;cursor:pointer}
.kelly-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kelly-box{border-radius:8px;padding:12px 14px}
.bt-row{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:5px;flex-wrap:wrap;margin-bottom:3px}
.cal-row{display:flex;align-items:center;gap:8px;padding:5px 8px;background:rgba(255,255,255,.02);border-radius:5px;border:1px solid #2e2416;margin-bottom:3px}
.trade-row{border-radius:8px;padding:11px 13px;margin-bottom:6px}
.error-box{background:#1a0a0a;border:1px solid #4a1a1a;border-radius:6px;padding:12px;color:#c06060;font-size:12px;font-family:monospace;margin-bottom:14px}
input[type=date],input[type=number],input[type=text]{background:#0a0907;border:1px solid #252015;border-radius:6px;color:#c8b890;padding:9px 12px;outline:none;font-family:monospace}
</style>
</head>
<body>
<div style="background:#080705;border-bottom:1px solid #252015;padding:15px 18px">
  <div style="font-size:20px;font-family:Georgia,serif;font-weight:900;color:#c8922a">&#9918; Diamond Market</div>
  <div style="font-size:9px;color:#6a5a3a;letter-spacing:3px;margin-top:1px">LIVE MLB &middot; FIP + wOBA + KELLY + VALUE FILTER</div>
</div>
<div class="tabs">
  <button class="tab active" onclick="showTab(0)">Daily Board</button>
  <button class="tab" onclick="showTab(1)">Game Detail</button>
  <button class="tab" onclick="showTab(2)">Best Plays</button>
  <button class="tab" onclick="showTab(3)">Season Record</button>
  <button class="tab" onclick="showTab(4)">Trade Log</button>
</div>
<div id="tab0" class="panel active"></div>
<div id="tab1" class="panel"></div>
<div id="tab2" class="panel"></div>
<div id="tab3" class="panel"></div>
<div id="tab4" class="panel"></div>
<script src="app.js"></script>
</body>
</html>
