<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diamond Market — MLB Predictions</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0b09;color:#c8b890;font-family:system-ui,-apple-system,sans-serif}
input[type=date],input[type=number]{color-scheme:dark}
select option{background:#111;color:#c8b890}
@keyframes spin{to{transform:rotate(360deg)}}

button:active{opacity:0.8}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

// ── PARK FACTORS ──────────────────────────────────────────────────────────────
const PARK_FACTORS = {
“Arizona Diamondbacks”:101,“Atlanta Braves”:100,“Baltimore Orioles”:100,
“Boston Red Sox”:104,“Chicago Cubs”:103,“Chicago White Sox”:100,
“Cincinnati Reds”:105,“Cleveland Guardians”:99,“Colorado Rockies”:115,
“Detroit Tigers”:97,“Houston Astros”:102,“Kansas City Royals”:99,
“Los Angeles Angels”:98,“Los Angeles Dodgers”:98,“Miami Marlins”:97,
“Milwaukee Brewers”:100,“Minnesota Twins”:99,“New York Mets”:98,
“New York Yankees”:102,“Oakland Athletics”:97,“Philadelphia Phillies”:103,
“Pittsburgh Pirates”:97,“San Diego Padres”:96,“San Francisco Giants”:97,
“Seattle Mariners”:96,“St. Louis Cardinals”:98,“Tampa Bay Rays”:97,
“Texas Rangers”:103,“Toronto Blue Jays”:102,“Washington Nationals”:99,
};

// ── MLB API ───────────────────────────────────────────────────────────────────
const MLB = “https://statsapi.mlb.com/api/v1”;
async function get(path) {
const r = await fetch(MLB + path);
if (!r.ok) throw new Error(“HTTP “ + r.status);
return r.json();
}
function daysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }
const FIP_C = 3.15;
function calcFIP(hr,bb,hbp,k,ip){ return ip>0 ? ((13*hr)+3*(bb+(hbp||0))-(2*k))/ip+FIP_C : null; }

async function fetchGames(date) {
const d = await get(`/schedule?sportId=1&date=${date}&hydrate=probablePitcher,team,venue,weather`);
if (!d.dates||!d.dates.length) return [];
return d.dates[0].games.map(g=>({
gamePk:g.gamePk, venue:g.venue?.name||””,
time:g.gameDate?new Date(g.gameDate).toLocaleTimeString([],{hour:“2-digit”,minute:“2-digit”}):””,
weather:g.weather?`${g.weather.temp}°F, ${g.weather.condition}, wind ${g.weather.wind}`:null,
away:{id:g.teams.away.team.id,name:g.teams.away.team.name,pitcherId:g.teams.away.probablePitcher?.id||null,pitcherName:g.teams.away.probablePitcher?.fullName||“TBD”},
home:{id:g.teams.home.team.id,name:g.teams.home.team.name,pitcherId:g.teams.home.probablePitcher?.id||null,pitcherName:g.teams.home.probablePitcher?.fullName||“TBD”},
}));
}

async function fetchStarter(pid,yr) {
if(!pid) return null;
try {
const d=await get(`/people/${pid}/stats?stats=season&group=pitching&season=${yr}`);
const s=d.stats?.[0]?.splits?.[0]?.stat; if(!s) return null;
const ip=parseFloat(s.inningsPitched)||0,hr=parseInt(s.homeRuns)||0,
bb=parseInt(s.baseOnBalls)||0,hbp=parseInt(s.hitByPitch)||0,
k=parseInt(s.strikeOuts)||0,gs=parseInt(s.gamesStarted)||1;
const fip=calcFIP(hr,bb,hbp,k,ip);
const xfip=ip>0?((13*(1.25*ip/9))+3*(bb+hbp)-(2*k))/ip+FIP_C:null;
return { era:parseFloat(s.era)||4.50, whip:parseFloat(s.whip)||1.35,
k9:parseFloat(s.strikeoutsPer9Inn)||8.5, bb9:parseFloat(s.walksPer9Inn)||3.2,
fip:fip||parseFloat(s.era)*0.95||4.30, xfip:xfip||parseFloat(s.era)*0.93||4.20,
ipsPerStart:ip/gs };
} catch { return null; }
}

async function fetchHitting(id,yr) {
try {
let woba=null,babip=null;
try { const ds=await get(`/teams/${id}/stats?stats=sabermetrics&group=hitting&season=${yr}`);
const ss=ds.stats?.[0]?.splits?.[0]?.stat;
if(ss){woba=parseFloat(ss.wOBA);babip=parseFloat(ss.babip);} } catch{}
const d=await get(`/teams/${id}/stats?stats=season&group=hitting&season=${yr}`);
const s=d.stats?.[0]?.splits?.[0]?.stat; if(!s) return null;
const obp=parseFloat(s.obp)||0.320, slg=parseFloat(s.slg)||0.410;
if(!woba||isNaN(woba)) woba=(obp*1.15+slg*0.62)/1.77;
if(!babip||isNaN(babip)) babip=parseFloat(s.babip)||0.295;
return { ba:parseFloat(s.avg)||0.250, obp, slg, woba, babip, ops:parseFloat(s.ops)||0.730 };
} catch { return null; }
}

async function fetchPitching(id,yr) {
try {
const d=await get(`/teams/${id}/stats?stats=season&group=pitching&season=${yr}`);
const s=d.stats?.[0]?.splits?.[0]?.stat; if(!s) return null;
const ip=parseFloat(s.inningsPitched)||1000,hr=parseInt(s.homeRuns)||150,
bb=parseInt(s.baseOnBalls)||450,hbp=parseInt(s.hitByPitch)||60,k=parseInt(s.strikeOuts)||1200;
return { teamEra:parseFloat(s.era)||4.20, teamWhip:parseFloat(s.whip)||1.28,
teamK9:parseFloat(s.strikeoutsPer9Inn)||8.5,
teamFip:calcFIP(hr,bb,hbp,k,ip)||4.05,
saves:parseInt(s.saves)||25, holds:parseInt(s.holds)||45, blownSaves:parseInt(s.blownSaves)||10 };
} catch { return null; }
}

async function fetchDefense(id,yr) {
try {
const d=await get(`/teams/${id}/stats?stats=season&group=fielding&season=${yr}`);
const s=d.stats?.[0]?.splits?.[0]?.stat; if(!s) return null;
return { fieldingPct:parseFloat(s.fielding)||0.983, errors:parseInt(s.errors)||80 };
} catch { return null; }
}

async function fetchRecent(id,date) {
try {
const d=await get(`/schedule?teamId=${id}&startDate=${daysAgo(20)}&endDate=${date}&sportId=1`);
const games=(d.dates||[]).flatMap(x=>x.games).filter(g=>g.status?.abstractGameState===“Final”).slice(-10);
if(!games.length) return {winPct:0.500};
const wins=games.filter(g=>g.teams.home.team.id===id?g.teams.home.isWinner:g.teams.away.isWinner).length;
return {winPct:wins/games.length};
} catch { return {winPct:0.500}; }
}

async function fetchStandings(id,yr) {
try {
const d=await get(`/standings?leagueId=103,104&season=${yr}&hydrate=team`);
for(const rec of d.records||[]) for(const tr of rec.teamRecords||[])
if(tr.team.id===id) return {rdiff:(tr.runsScored||0)-(tr.runsAllowed||0),wins:tr.wins||0,losses:tr.losses||0,pct:parseFloat(tr.winningPercentage)||0.500};
return {rdiff:0,pct:0.500};
} catch { return {rdiff:0,pct:0.500}; }
}

async function fetchH2H(awayId,homeId,yr) {
try {
const d=await get(`/schedule?sportId=1&season=${yr}&teamId=${awayId}&opponentId=${homeId}`);
const games=(d.dates||[]).flatMap(x=>x.games).filter(g=>g.status?.abstractGameState===“Final”);
if(games.length<3) return null;
const awayWins=games.filter(g=>(g.teams.away.team.id===awayId&&g.teams.away.isWinner)||(g.teams.home.team.id===awayId&&g.teams.home.isWinner)).length;
return {awayWins,total:games.length,awayPct:awayWins/games.length};
} catch { return null; }
}

// ── MODEL ─────────────────────────────────────────────────────────────────────
const AVG_SP={era:4.20,whip:1.30,k9:8.8,bb9:3.2,fip:4.05,xfip:4.00,ipsPerStart:5.0};
const AVG_HIT={ba:0.250,obp:0.320,slg:0.415,woba:0.315,babip:0.295};
const AVG_PITCH={teamEra:4.20,teamWhip:1.28,teamK9:8.5,teamFip:4.05,saves:25,holds:45,blownSaves:10};
const AVG_DEF={fieldingPct:0.983,errors:80};

function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function fromLO(lo){return 1/(1+Math.exp(-lo))}

function blendPitching(sp,tp) {
const S=sp||AVG_SP, T=tp||AVG_PITCH;
const spInn=clamp(S.ipsPerStart||5.0,3.5,7.0), bpInn=9-spInn;
const bpEra=clamp((T.teamEra*9-S.era*spInn)/bpInn,2.5,7.5);
const bpWhip=clamp((T.teamWhip*9-S.whip*spInn)/bpInn,0.9,2.2);
const bpK9=clamp((T.teamK9*9-S.k9*spInn)/bpInn,5.0,14.0);
const bpFip=clamp((T.teamFip*9-S.fip*spInn)/bpInn,2.5,7.5);
const bsv=T.saves+T.blownSaves;
return {
spInn,bpInn,
starterEra:S.era,starterWhip:S.whip,starterK9:S.k9,starterFip:S.fip,starterXfip:S.xfip,starterBb9:S.bb9,
bullpenEra:bpEra,bullpenWhip:bpWhip,bullpenFip:bpFip,
blendedEra:(S.era*spInn+bpEra*bpInn)/9,
blendedWhip:(S.whip*spInn+bpWhip*bpInn)/9,
blendedK9:(S.k9*spInn+bpK9*bpInn)/9,
blendedFip:(S.fip*spInn+bpFip*bpInn)/9,
bullpenDepth:(T.saves+T.holds)/70,
svPct:bsv>0?T.saves/bsv:0.70,
};
}

function runModel(A,B,h2h) {
const pfB=(PARK_FACTORS[B.name]||100)/100;
const pfA=(PARK_FACTORS[A.name]||100)/100;
const aWoba=(A.hit.woba/pfA)*pfB;
const bWoba=(B.hit.woba/pfA)*pfB;
const aLuck=(A.hit.babip-0.295)*0.5;
const bLuck=(B.hit.babip-0.295)*0.5;
const aDefScore=(A.def.fieldingPct-0.983)*50-(A.def.errors-80)*0.003;
const bDefScore=(B.def.fieldingPct-0.983)*50-(B.def.errors-80)*0.003;
const aBpRel=(A.pitch.svPct-0.70)*0.3;
const bBpRel=(B.pitch.svPct-0.70)*0.3;

let lo=0;
lo+=(B.pitch.blendedFip-A.pitch.blendedFip)*0.24;
lo+=(B.pitch.blendedWhip-A.pitch.blendedWhip)*0.20;
lo+=(A.pitch.blendedK9-B.pitch.blendedK9)*0.04;
lo+=(A.pitch.starterBb9-B.pitch.starterBb9)*0.06;
lo+=aBpRel-bBpRel;
lo+=(A.pitch.bullpenDepth-B.pitch.bullpenDepth)*0.10;
lo+=(aWoba-bWoba)*4.2;
lo+=(A.hit.slg-B.hit.slg)*0.8;
lo-=(aLuck-bLuck);
lo+=(aDefScore-bDefScore)*0.08;
lo-=0.16;
lo+=(A.stand.rdiff-B.stand.rdiff)*0.005;
lo+=(A.recent.winPct-B.recent.winPct)*0.50;
lo+=(A.stand.pct-B.stand.pct)*0.30;
if(h2h&&h2h.total>=3) lo+=(h2h.awayPct-0.500)*0.20;
lo+=((PARK_FACTORS[B.name]||100)-100)*0.004;

const pA=clamp(fromLO(lo),0.22,0.78);
const pB=1-pA;
const ml=p=>p>=0.5?”-”+Math.round(p/(1-p)*100):”+”+Math.round((1-p)/p*100);
const rA=Math.max(1,Math.round(aWoba*14-B.pitch.blendedFip*0.30));
const rB=Math.max(1,Math.round(bWoba*14-A.pitch.blendedFip*0.30));
const winner=pA>=pB?A.name:B.name;
const winnerP=pA>=pB?pA:pB;
const winnerML=pA>=pB?ml(pA):ml(pB);

const factors=[
{label:“Blended FIP”,aVal:A.pitch.blendedFip.toFixed(2),bVal:B.pitch.blendedFip.toFixed(2),delta:(B.pitch.blendedFip-A.pitch.blendedFip)*0.24},
{label:“Blended WHIP”,aVal:A.pitch.blendedWhip.toFixed(2),bVal:B.pitch.blendedWhip.toFixed(2),delta:(B.pitch.blendedWhip-A.pitch.blendedWhip)*0.20},
{label:“BB/9”,aVal:A.pitch.starterBb9.toFixed(1),bVal:B.pitch.starterBb9.toFixed(1),delta:(A.pitch.starterBb9-B.pitch.starterBb9)*0.06},
{label:“K/9”,aVal:A.pitch.blendedK9.toFixed(1),bVal:B.pitch.blendedK9.toFixed(1),delta:(A.pitch.blendedK9-B.pitch.blendedK9)*0.04},
{label:“Bullpen Depth”,aVal:Math.round(A.pitch.bullpenDepth*70),bVal:Math.round(B.pitch.bullpenDepth*70),delta:(A.pitch.bullpenDepth-B.pitch.bullpenDepth)*0.10},
{label:“Save %”,aVal:(A.pitch.svPct*100).toFixed(0)+”%”,bVal:(B.pitch.svPct*100).toFixed(0)+”%”,delta:aBpRel-bBpRel},
{label:“wOBA (park-adj)”,aVal:aWoba.toFixed(3),bVal:bWoba.toFixed(3),delta:(aWoba-bWoba)*4.2},
{label:“Team SLG”,aVal:A.hit.slg.toFixed(3),bVal:B.hit.slg.toFixed(3),delta:(A.hit.slg-B.hit.slg)*0.8},
{label:“BABIP luck”,aVal:A.hit.babip.toFixed(3),bVal:B.hit.babip.toFixed(3),delta:-(aLuck-bLuck),detail:“High BABIP slightly discounted”},
{label:“Defense”,aVal:A.def.fieldingPct.toFixed(3),bVal:B.def.fieldingPct.toFixed(3),delta:(aDefScore-bDefScore)*0.08},
{label:“Park Factor”,aVal:(PARK_FACTORS[A.name]||100)+””,bVal:(PARK_FACTORS[B.name]||100)+” (home)”,delta:((PARK_FACTORS[B.name]||100)-100)*0.004},
{label:“Home Field”,aVal:“Away”,bVal:“Home 🏠”,delta:-0.16},
{label:“Season Win%”,aVal:(A.stand.pct*1000|0)/10+”%”,bVal:(B.stand.pct*1000|0)/10+”%”,delta:(A.stand.pct-B.stand.pct)*0.30},
{label:“Recent Form L10”,aVal:Math.round(A.recent.winPct*10)+”-”+Math.round((1-A.recent.winPct)*10),bVal:Math.round(B.recent.winPct*10)+”-”+Math.round((1-B.recent.winPct)*10),delta:(A.recent.winPct-B.recent.winPct)*0.50},
{label:“Run Diff”,aVal:(A.stand.rdiff>=0?”+”:””)+A.stand.rdiff,bVal:(B.stand.rdiff>=0?”+”:””)+B.stand.rdiff,delta:(A.stand.rdiff-B.stand.rdiff)*0.005},
h2h&&h2h.total>=3?{label:“Head-to-Head”,aVal:h2h.awayWins+”-”+(h2h.total-h2h.awayWins)+” away”,bVal:(h2h.total-h2h.awayWins)+”-”+h2h.awayWins+” home”,delta:(h2h.awayPct-0.5)*0.20}:null,
].filter(Boolean).sort((x,y)=>Math.abs(y.delta)-Math.abs(x.delta));

return {
pctA:Math.round(pA*100),pctB:Math.round(pB*100),
mlA:ml(pA),mlB:ml(pB),
ou:(rA+rB+0.5).toFixed(1),
confidence:Math.abs(pA-0.5)>0.15?“High”:Math.abs(pA-0.5)>0.07?“Medium”:“Low”,
winner,winnerP,winnerML,
projScore:pA>=pB?`${Math.max(rA,rB)}–${Math.min(rA,rB)}`:`${Math.min(rA,rB)}–${Math.max(rA,rB)}`,
factors,aName:A.name,bName:B.name,
aPitcher:A.pitcherName,bPitcher:B.pitcherName,
aBlend:A.pitch,bBlend:B.pitch,
parkB:PARK_FACTORS[B.name]||100,h2h,
};
}

async function analyzeGame(game,date) {
const yr=date.slice(0,4);
const [sA,sB,hA,hB,pA,pB,dA,dB,rA,rB,stA,stB,h2h]=await Promise.all([
fetchStarter(game.away.pitcherId,yr), fetchStarter(game.home.pitcherId,yr),
fetchHitting(game.away.id,yr),       fetchHitting(game.home.id,yr),
fetchPitching(game.away.id,yr),      fetchPitching(game.home.id,yr),
fetchDefense(game.away.id,yr),       fetchDefense(game.home.id,yr),
fetchRecent(game.away.id,date),      fetchRecent(game.home.id,date),
fetchStandings(game.away.id,yr),     fetchStandings(game.home.id,yr),
fetchH2H(game.away.id,game.home.id,yr),
]);
const A={name:game.away.name,pitcherName:game.away.pitcherName,pitch:blendPitching(sA,pA),hit:hA||AVG_HIT,def:dA||AVG_DEF,recent:rA,stand:stA};
const B={name:game.home.name,pitcherName:game.home.pitcherName,pitch:blendPitching(sB,pB),hit:hB||AVG_HIT,def:dB||AVG_DEF,recent:rB,stand:stB};
return {…runModel(A,B,h2h),weather:game.weather,venue:game.venue,time:game.time,gamePk:game.gamePk};
}

// ── KELLY CRITERION ───────────────────────────────────────────────────────────
function mlToDecimal(ml) {
const n=parseInt(ml);
return n>0 ? (n/100)+1 : (100/Math.abs(n))+1;
}
function kelly(p,ml,fraction=0.25) {
// fractional Kelly (25% = conservative)
const b=mlToDecimal(ml)-1; // net odds
const q=1-p;
const k=(b*p-q)/b;
return Math.max(0,k*fraction); // never negative
}
function confScore(r) {
// 0–1 edge score based on win probability distance from 50%
return Math.abs(r.winnerP-0.5)*2;
}
// Convert moneyline to implied probability (with vig removed)
function mlToImplied(ml) {
if(!ml) return null;
const n=parseInt(ml);
if(isNaN(n)) return null;
const raw=n>0 ? 100/(n+100) : Math.abs(n)/(Math.abs(n)+100);
return raw; // raw includes vig — we use this as the “book’s view”
}

// Edge = model probability minus book implied probability
// Positive = model thinks team is more likely to win than book implies
function calcEdge(modelP, bookML) {
const bookP=mlToImplied(bookML);
if(bookP===null) return null;
return modelP - bookP;
}

function buildParlays(results, bookOdds={}, minEdgePct=2) {
const minEdge=minEdgePct/100;

const withEdge=results
.filter(r=>r.winnerP>=0.54)
.map(r=>{
const bookML=bookOdds[r.gamePk]||null;
const edge=bookML ? calcEdge(r.winnerP, bookML) : null;
const hasEdge=edge!==null ? edge>=minEdge : true; // if no book odds entered, include by default
const effectiveML=bookML||r.winnerML; // use book odds for Kelly if available
const kPct=kelly(r.winnerP, effectiveML)*100;
return {…r, bookML, edge, hasEdge, effectiveML, kellyPct:kPct};
})
.filter(r=>r.hasEdge)
.sort((a,b)=>{
// Sort by edge if available, else by model confidence
const ea=a.edge!==null?a.edge:confScore(a)*0.1;
const eb=b.edge!==null?b.edge:confScore(b)*0.1;
return eb-ea;
});

// No-odds fallback: if user hasn’t entered any book odds, use model confidence sort
const allHaveOdds=results.filter(r=>r.winnerP>=0.54).every(r=>bookOdds[r.gamePk]);

const singles=withEdge.slice(0,3).map(r=>({
legs:[r], type:“Single”,
combinedP:r.winnerP,
payout:mlToDecimal(r.effectiveML),
kellyPct:r.kellyPct,
label:r.winner,
hasEdgeData:r.edge!==null,
}));

const top4=withEdge.slice(0,4);
const parlays2=[];
for(let i=0;i<top4.length;i++) for(let j=i+1;j<top4.length;j++) {
const a=top4[i],b=top4[j];
if(a.gamePk===b.gamePk) continue;
const combinedP=a.winnerP*b.winnerP;
const payout=mlToDecimal(a.effectiveML)*mlToDecimal(b.effectiveML);
const impliedML=”+”+Math.round((payout-1)*100);
const kPct=kelly(combinedP,impliedML)*100;
// Combined edge: both legs must have positive edge if odds entered
const combinedEdge=(a.edge!==null&&b.edge!==null)?((a.edge+b.edge)/2):null;
parlays2.push({legs:[a,b],type:“2-Leg Parlay”,combinedP,payout,kellyPct:kPct,
combinedEdge, label:a.winner+” + “+b.winner});
}
parlays2.sort((a,b)=>{
const ea=a.combinedEdge!==null?a.combinedEdge:a.combinedP;
const eb=b.combinedEdge!==null?b.combinedEdge:b.combinedP;
return eb-ea;
});

const parlays3=[];
const top3=withEdge.slice(0,3);
if(top3.length===3){
const [a,b,c]=top3;
if(a.gamePk!==b.gamePk&&b.gamePk!==c.gamePk&&a.gamePk!==c.gamePk){
const combinedP=a.winnerP*b.winnerP*c.winnerP;
const payout=mlToDecimal(a.effectiveML)*mlToDecimal(b.effectiveML)*mlToDecimal(c.effectiveML);
const kPct=kelly(combinedP,”+”+Math.round((payout-1)*100))*100;
const combinedEdge=(a.edge!==null&&b.edge!==null&&c.edge!==null)?((a.edge+b.edge+c.edge)/3):null;
parlays3.push({legs:[a,b,c],type:“3-Leg Parlay”,combinedP,payout,kellyPct:kPct,
combinedEdge,label:a.winner+” + “+b.winner+” + “+c.winner});
}
}

return {singles,parlays2:parlays2.slice(0,2),parlays3,allHaveOdds,edgeFiltered:withEdge.length};
}

// ── COLORS ────────────────────────────────────────────────────────────────────
const C={bg:”#0c0b09”,card:”#111009”,border:”#252015”,gold:”#c8922a”,goldLight:”#e0b040”,

const _cache = {};
async function cachedTeamStats(id, yr) {
const k = id+”-”+yr;
if (_cache[k]) return _cache[k];
const [hit,pit,def,stand] = await Promise.all([
fetchHitting(id,yr), fetchPitching(id,yr), fetchDefense(id,yr), fetchStandings(id,yr)
]);
_cache[k] = {hit:hit||AVG_HIT, pit, def:def||AVG_DEF, stand};
return _cache[k];
}

async function fetchCompletedRange(startDate, endDate) {
const d = await get(`/schedule?sportId=1&startDate=${startDate}&endDate=${endDate}&hydrate=probablePitcher,team,decisions`);
const all = (d.dates||[]).flatMap(x => x.games);
return all.filter(g => g.status?.abstractGameState === “Final”).map(g => ({
gamePk: g.gamePk,
date: (g.officialDate||g.gameDate||””).slice(0,10),
away: { id:g.teams.away.team.id, name:g.teams.away.team.name, pitcherId:g.teams.away.probablePitcher?.id||null, pitcherName:g.teams.away.probablePitcher?.fullName||“TBD” },
home: { id:g.teams.home.team.id, name:g.teams.home.team.name, pitcherId:g.teams.home.probablePitcher?.id||null, pitcherName:g.teams.home.probablePitcher?.fullName||“TBD” },
actualWinner: g.teams.home.isWinner ? g.teams.home.team.name : g.teams.away.isWinner ? g.teams.away.team.name : null,
})).filter(g => g.actualWinner);
}

]);

                  ["3-Leg Parlay",bt.p3Record,"#9a5ac0",bt.p3Roi,bt.p3Bank],
                ].map(([label,rec,col,roi,bank])=>(
                  <div key={label} style={{background:"rgba(255,255,255,0.02)",border:"1px solid "+col+"44",borderRadius:8,padding:"10px 8px",textAlign:"center"}}>
                    <div style={{fontSize:9,color:col,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>{label}</div>
                    <div style={{fontSize:18,fontWeight:900,fontFamily:"monospace",color:rec.pct!==null&&parseFloat(rec.pct)>50?"#5aba8a":"#c06060"}}>{rec.pct!==null?rec.pct+"%":"—"}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:2}}>{rec.w}-{rec.l} ({rec.played} days)</div>
                    <div style={{fontSize:10,fontFamily:"monospace",color:parseFloat(roi)>=0?"#5aba8a":"#c06060",marginTop:4}}>ROI {roi}%</div>
                    <div style={{fontSize:9,color:C.dim}}>${""+parseFloat(bank).toLocaleString()}</div>
                  </div>
                ))}
              </div>

              {/* Equity curves for each play type */}
              <div style={{fontSize:9,color:C.dim,letterSpacing:2,marginBottom:6}}>BANKROLL CURVES BY PLAY TYPE</div>
              <svg width="100%" height="80" style={{display:"block",marginBottom:4}}>
                {(()=>{
                  const curves=[
                    {eq:bt.p1Eq,col:"#c8922a"},
                    {eq:bt.p2Eq,col:"#5a9ac0"},
                    {eq:bt.p3Eq,col:"#9a5ac0"},
                  ];
                  const allVals=curves.flatMap(c=>c.eq);
                  if(!allVals.length) return null;
                  const mn=Math.min(bankroll*0.7,...allVals), mx=Math.max(bankroll*1.3,...allVals), range=mx-mn||1;
                  const baseY=80-(bankroll-mn)/range*72;
                  return(<>
                    <line x1="0" y1={baseY} x2="100%" y2={baseY} stroke={C.dim} strokeWidth="1" strokeDasharray="3,3"/>
                    {curves.map(({eq,col},ci)=>{
                      if(eq.length<2) return null;
                      const pts=eq.map((v,i)=>`${(i/(eq.length-1)*100).toFixed(1)},${(80-(v-mn)/range*72).toFixed(1)}`).join(" ");
                      return <polyline key={ci} points={pts} fill="none" stroke={col} strokeWidth="1.5" vectorEffect="non-scaling-stroke" opacity="0.85"/>;
                    })}
                  </>);
                })()}
              </svg>
              <div style={{display:"flex",gap:16,fontSize:9,color:C.muted}}>
                <span>■ <span style={{color:"#c8922a"}}>Single</span></span>
                <span>■ <span style={{color:"#5a9ac0"}}>2-Leg</span></span>
                <span>■ <span style={{color:"#9a5ac0"}}>3-Leg</span></span>
                <span style={{color:C.dim}}>· dashed = starting bankroll</span>
              </div>
            </Card>

            {/* Day-by-day parlay log */}
            <Card style={{marginBottom:12}}>
              <Lbl>Parlay Log by Day</Lbl>
              <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:360,overflowY:"auto"}}>
                {bt.parlayDays.slice().reverse().map((day,i)=>(
                  <div key={i} style={{background:"rgba(255,255,255,0.02)",border:"1px solid "+C.dim,borderRadius:7,padding:"8px 10px"}}>
                    <div style={{fontSize:10,color:C.muted,fontFamily:"monospace",marginBottom:6,fontWeight:700}}>{day.date}</div>
                    <div style={{display:"flex",flexDirection:"column",gap:3}}>
                      {[
                        {key:"single", label:"1-Leg", col:"#c8922a"},
                        {key:"parlay2", label:"2-Leg", col:"#5a9ac0"},
                        {key:"parlay3", label:"3-Leg", col:"#9a5ac0"},
                      ].map(({key,label,col})=>{
                        const p=day[key]; if(!p) return null;
                        return(
                          <div key={key} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 8px",background:p.hit?"rgba(58,138,90,0.07)":"rgba(138,58,58,0.07)",borderRadius:4,border:"1px solid "+(p.hit?"#1a3a2a":"#3a1a1a")}}>
                            <span style={{fontSize:9,fontWeight:700,color:col,width:32,flexShrink:0}}>{label}</span>
                            <span style={{fontSize:10,color:p.hit?C.goldLight:"#777",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.label}</span>
                            <span style={{fontSize:10,color:p.hit?"#5aba8a":"#c06060",flexShrink:0}}>{p.hit?"✓ HIT":"✗ MISS"}</span>
                            <span style={{fontSize:9,color:C.dim,flexShrink:0}}>{(p.combinedP*100).toFixed(0)}%</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </Card>

            {/* Individual game log */}
            <Card>
              <Lbl>Individual Game Log ({bt.bets.length} games)</Lbl>
              <div style={{display:"flex",flexDirection:"column",gap:3,maxHeight:320,overflowY:"auto"}}>
                {bt.bets.slice().reverse().map((r,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 9px",background:r.correct?"rgba(58,138,90,0.06)":"rgba(138,58,58,0.06)",borderRadius:5,border:"1px solid "+(r.correct?"#1a3a2a":"#3a1a1a"),flexWrap:"wrap"}}>
                    <span style={{fontSize:9,color:C.dim,width:70,flexShrink:0,fontFamily:"monospace"}}>{r.date}</span>
                    <span style={{fontSize:10,color:r.correct?C.goldLight:"#888",flex:1,fontWeight:r.correct?700:400}}>{r.winner}</span>
                    <span style={{fontSize:9,color:r.correct?"#3a6a3a":"#6a3a3a",flexShrink:0}}>{r.correct?"✓":"✗"} {r.actualWinner.split(" ").pop()}</span>
                    <span style={{fontSize:10,fontFamily:"monospace",color:r.winnerML.startsWith("+")?C.green:C.text,width:40,textAlign:"right",flexShrink:0}}>{r.winnerML}</span>
                    <span style={{fontSize:9,color:confCol(r.confidence),width:34,textAlign:"right",flexShrink:0}}>{r.confidence}</span>
                  </div>
                ))}
              </div>
            </Card>
          </>
        );})()}
      </div>
    )}
  </div>
</div>
