<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diamond Market</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0b09;color:#c8b890;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding-bottom:80px}
input,select,button{font-family:inherit}
input[type=date],input[type=number]{color-scheme:dark}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #2e2416;border-top-color:#c8922a;border-radius:50%;animation:spin .8s linear infinite}
.card{background:#111009;border:1px solid #252015;border-radius:10px;padding:16px 18px;margin-bottom:12px}
.lbl{font-size:9px;letter-spacing:3px;color:#6a5a3a;text-transform:uppercase;margin-bottom:8px}
.tabs{display:flex;border-bottom:1px solid #252015;background:#090806;position:sticky;top:0;z-index:10}
.tab{flex:1;padding:11px 4px;border:none;background:transparent;color:#6a5a3a;font-size:10px;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#c8922a;border-bottom-color:#c8922a;font-weight:700}
.panel{display:none;max-width:820px;margin:0 auto;padding:14px 12px}
.panel.active{display:block}
.win-bar{display:flex;height:32px;border-radius:4px;overflow:hidden;border:1px solid #252015;margin-top:6px}
.win-a{background:linear-gradient(90deg,#b07820,#d4a030);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#1a1000;font-family:monospace}
.win-b{background:linear-gradient(90deg,#2a5070,#3a6a9a);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#c0d8f0;font-family:monospace}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.chip{border:1px solid #252015;background:rgba(255,255,255,.02);border-radius:6px;padding:8px 10px;text-align:center;flex:1 1 70px}
.chip.gold{border-color:#c8922a;background:rgba(200,146,42,.08)}
.chip .cl{font-size:9px;color:#6a5a3a;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.chip .cv{font-size:16px;font-weight:900;color:#c8b890;font-family:monospace}
.chip.gold .cv{color:#e0b040}
.chip.green{border-color:#3a8a5a;background:rgba(90,186,138,.08)}
.chip.green .cv{color:#5aba8a}
.factor{padding:7px 0;border-bottom:1px solid #2e2416}
.frow{display:flex;justify-content:space-between;margin-bottom:3px;flex-wrap:wrap;gap:3px}
.fbar{height:3px;background:#2e2416;border-radius:2px;margin-top:3px;position:relative}
.fbar-fill{height:100%;border-radius:2px;position:absolute}
.game-row{background:rgba(255,255,255,.02);border:1px solid #252015;border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer}
.parlay-card{border-radius:10px;padding:14px 16px;margin-bottom:10px}
.parlay-leg{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:rgba(255,255,255,.02);border-radius:6px;margin-bottom:6px;border:1px solid #2e2416;cursor:pointer}
.kelly-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kelly-box{border-radius:8px;padding:12px 14px}
.bt-row{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:5px;flex-wrap:wrap;margin-bottom:3px}
.parlay-day{background:rgba(255,255,255,.02);border:1px solid #2e2416;border-radius:7px;padding:8px 10px;margin-bottom:5px}
.day-leg{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:4px;margin-bottom:3px}
.error-box{background:#1a0a0a;border:1px solid #4a1a1a;border-radius:6px;padding:12px;color:#c06060;font-size:12px;font-family:monospace;margin-bottom:14px}
.header{background:#080705;border-bottom:1px solid #252015;padding:15px 18px}
input[type=date],input[type=number],input[type=text]{background:#0a0907;border:1px solid #252015;border-radius:6px;color:#c8b890;padding:9px 12px;outline:none;font-family:monospace}
button.primary{padding:9px 18px;border-radius:6px;border:none;background:linear-gradient(135deg,#c8922a,#9a6e18);color:#080600;font-weight:900;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:8px}
button.primary:disabled{background:#2e2416;color:#6a5a3a;cursor:not-allowed}
button.secondary{padding:8px 16px;border-radius:6px;border:none;background:linear-gradient(135deg,#3a8a5a,#2a6a4a);color:#080600;font-weight:900;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
button.edge-btn{padding:5px 12px;border-radius:4px;border:1px solid #252015;background:transparent;color:#6a5a3a;font-size:11px;cursor:pointer;font-family:monospace}
button.edge-btn.active{border-color:#5aba8a;background:rgba(90,186,138,.12);color:#5aba8a}
.pitch-box{background:rgba(255,255,255,.02);border-radius:6px;padding:10px 12px;border:1px solid #2e2416}
.pitch-blended{margin-top:5px;padding:3px 8px;background:rgba(200,146,42,.06);border-radius:4px;font-family:monospace;font-size:10px;color:#c8922a;font-weight:700}
.cal-row{display:flex;align-items:center;gap:8px;padding:5px 8px;background:rgba(255,255,255,.02);border-radius:5px;border:1px solid #2e2416;margin-bottom:3px}
</style>
</head>
<body>

<div class="header">
  <div style="font-size:20px;font-family:Georgia,serif;font-weight:900;color:#c8922a">⚾ Diamond Market</div>
  <div style="font-size:9px;color:#6a5a3a;letter-spacing:3px;margin-top:1px">LIVE MLB · FIP + wOBA + KELLY + VALUE FILTER</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab(0)">Daily Board</button>
  <button class="tab" onclick="showTab(1)">Game Detail</button>
  <button class="tab" onclick="showTab(2)">Best Plays</button>
  <button class="tab" onclick="showTab(3)">Season Record</button>
</div>

<div id="tab0" class="panel active"></div>
<div id="tab1" class="panel"></div>
<div id="tab2" class="panel"></div>
<div id="tab3" class="panel"></div>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
var S = {
  date: ls('dm-date') || today(),
  bankroll: ls('dm-bankroll') || 1000,
  bookOdds: ls('dm-bookodds') || {},
  minEdge: ls('dm-minedge') || 2,
  btStart: ls('dm-btstart') || daysAgo(30),
  btEnd: ls('dm-btend') || daysAgo(1),
  results: [], detail: null, parlays: null,
  loading: false, progress: '', error: '',
  btResults: null, btLoading: false, btProgress: '', btError: ''
};

function ls(k) { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } }
function lsSet(k,v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
function today() { return new Date().toISOString().slice(0,10); }
function daysAgo(n) { var d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }
function set(k,v) { S[k]=v; lsSet('dm-'+k,v); }

// ── PARK FACTORS ──────────────────────────────────────────────────────────────
var PARK = {'Arizona Diamondbacks':101,'Atlanta Braves':100,'Baltimore Orioles':100,'Boston Red Sox':104,'Chicago Cubs':103,'Chicago White Sox':100,'Cincinnati Reds':105,'Cleveland Guardians':99,'Colorado Rockies':115,'Detroit Tigers':97,'Houston Astros':102,'Kansas City Royals':99,'Los Angeles Angels':98,'Los Angeles Dodgers':98,'Miami Marlins':97,'Milwaukee Brewers':100,'Minnesota Twins':99,'New York Mets':98,'New York Yankees':102,'Oakland Athletics':97,'Philadelphia Phillies':103,'Pittsburgh Pirates':97,'San Diego Padres':96,'San Francisco Giants':97,'Seattle Mariners':96,'St. Louis Cardinals':98,'Tampa Bay Rays':97,'Texas Rangers':103,'Toronto Blue Jays':102,'Washington Nationals':99};

// ── MLB API ───────────────────────────────────────────────────────────────────
var MLB = 'https://statsapi.mlb.com/api/v1';
function get(path) { return fetch(MLB+path).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }); }

function fetchGames(date) {
  return get('/schedule?sportId=1&date='+date+'&hydrate=probablePitcher,team,venue,weather').then(function(d) {
    if (!d.dates||!d.dates.length) return [];
    return d.dates[0].games.map(function(g) {
      return {
        gamePk:g.gamePk, venue:(g.venue&&g.venue.name)||'',
        time:g.gameDate?new Date(g.gameDate).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'',
        weather:(function(){
          if(!g.weather) return null;
          var t=g.weather.temp,cd=g.weather.condition,w=g.weather.wind;
          if(!t&&!cd&&!w) return null;
          var parts=[];
          if(t) parts.push(t+'F');
          if(cd) parts.push(cd);
          if(w) parts.push('wind '+w);
          return parts.join(', ');
        })(),
        away:{id:g.teams.away.team.id,name:g.teams.away.team.name,pitcherId:(g.teams.away.probablePitcher&&g.teams.away.probablePitcher.id)||null,pitcherName:(g.teams.away.probablePitcher&&g.teams.away.probablePitcher.fullName)||'TBD'},
        home:{id:g.teams.home.team.id,name:g.teams.home.team.name,pitcherId:(g.teams.home.probablePitcher&&g.teams.home.probablePitcher.id)||null,pitcherName:(g.teams.home.probablePitcher&&g.teams.home.probablePitcher.fullName)||'TBD'}
      };
    });
  });
}

function fetchStarter(pid,yr) {
  if (!pid) return Promise.resolve(null);
  return get('/people/'+pid+'/stats?stats=season&group=pitching&season='+yr).then(function(d) {
    var s=d.stats&&d.stats[0]&&d.stats[0].splits&&d.stats[0].splits[0]?d.stats[0].splits[0].stat:null;
    if (!s) return null;
    var ip=parseFloat(s.inningsPitched)||0,hr=parseInt(s.homeRuns)||0,bb=parseInt(s.baseOnBalls)||0,hbp=parseInt(s.hitByPitch)||0,k=parseInt(s.strikeOuts)||0,gs=parseInt(s.gamesStarted)||1;
    var fip=ip>0?((13*hr)+3*(bb+hbp)-(2*k))/ip+3.15:null;
    var xfip=ip>0?((13*(1.25*ip/9))+3*(bb+hbp)-(2*k))/ip+3.15:null;
    return {era:parseFloat(s.era)||4.50,whip:parseFloat(s.whip)||1.35,k9:parseFloat(s.strikeoutsPer9Inn)||8.5,bb9:parseFloat(s.walksPer9Inn)||3.2,fip:fip||parseFloat(s.era)*0.95||4.30,xfip:xfip||parseFloat(s.era)*0.93||4.20,ipsPerStart:ip/gs};
  }).catch(function(){return null;});
}

function fetchHitting(id,yr) {
  var woba=null,babip=null;
  return get('/teams/'+id+'/stats?stats=sabermetrics&group=hitting&season='+yr).then(function(ds) {
    var ss=ds.stats&&ds.stats[0]&&ds.stats[0].splits&&ds.stats[0].splits[0]?ds.stats[0].splits[0].stat:null;
    if(ss){woba=parseFloat(ss.wOBA);babip=parseFloat(ss.babip);}
  }).catch(function(){}).then(function() {
    return get('/teams/'+id+'/stats?stats=season&group=hitting&season='+yr);
  }).then(function(d) {
    var s=d.stats&&d.stats[0]&&d.stats[0].splits&&d.stats[0].splits[0]?d.stats[0].splits[0].stat:null;
    if(!s) return null;
    var obp=parseFloat(s.obp)||0.320,slg=parseFloat(s.slg)||0.410;
    if(!woba||isNaN(woba)) woba=(obp*1.15+slg*0.62)/1.77;
    if(!babip||isNaN(babip)) babip=parseFloat(s.babip)||0.295;
    return {ba:parseFloat(s.avg)||0.250,obp:obp,slg:slg,woba:woba,babip:babip};
  }).catch(function(){return null;});
}

function fetchPitching(id,yr) {
  return get('/teams/'+id+'/stats?stats=season&group=pitching&season='+yr).then(function(d) {
    var s=d.stats&&d.stats[0]&&d.stats[0].splits&&d.stats[0].splits[0]?d.stats[0].splits[0].stat:null;
    if(!s) return null;
    var ip=parseFloat(s.inningsPitched)||1000,hr=parseInt(s.homeRuns)||150,bb=parseInt(s.baseOnBalls)||450,hbp=parseInt(s.hitByPitch)||60,k=parseInt(s.strikeOuts)||1200;
    var fip=ip>0?((13*hr)+3*(bb+hbp)-(2*k))/ip+3.15:4.05;
    return {teamEra:parseFloat(s.era)||4.20,teamWhip:parseFloat(s.whip)||1.28,teamK9:parseFloat(s.strikeoutsPer9Inn)||8.5,teamFip:fip,saves:parseInt(s.saves)||25,holds:parseInt(s.holds)||45,blownSaves:parseInt(s.blownSaves)||10};
  }).catch(function(){return null;});
}

function fetchDefense(id,yr) {
  return get('/teams/'+id+'/stats?stats=season&group=fielding&season='+yr).then(function(d) {
    var s=d.stats&&d.stats[0]&&d.stats[0].splits&&d.stats[0].splits[0]?d.stats[0].splits[0].stat:null;
    if(!s) return null;
    return {fieldingPct:parseFloat(s.fielding)||0.983,errors:parseInt(s.errors)||80};
  }).catch(function(){return null;});
}

function fetchRecent(id,date) {
  return get('/schedule?teamId='+id+'&startDate='+daysAgo(20)+'&endDate='+date+'&sportId=1').then(function(d) {
    var games=(d.dates||[]).reduce(function(a,x){return a.concat(x.games);},[]).filter(function(g){return g.status&&g.status.abstractGameState==='Final';}).slice(-10);
    if(!games.length) return {winPct:0.500};
    var wins=games.filter(function(g){return g.teams.home.team.id===id?g.teams.home.isWinner:g.teams.away.isWinner;}).length;
    return {winPct:wins/games.length};
  }).catch(function(){return {winPct:0.500};});
}

function fetchStandings(id,yr) {
  return get('/standings?leagueId=103,104&season='+yr+'&hydrate=team').then(function(d) {
    for(var i=0;i<(d.records||[]).length;i++){
      for(var j=0;j<(d.records[i].teamRecords||[]).length;j++){
        var tr=d.records[i].teamRecords[j];
        if(tr.team.id===id) return {rdiff:(tr.runsScored||0)-(tr.runsAllowed||0),pct:parseFloat(tr.winningPercentage)||0.500};
      }
    }
    return {rdiff:0,pct:0.500};
  }).catch(function(){return {rdiff:0,pct:0.500};});
}

function fetchH2H(awayId,homeId,yr) {
  return get('/schedule?sportId=1&season='+yr+'&teamId='+awayId+'&opponentId='+homeId).then(function(d) {
    var games=(d.dates||[]).reduce(function(a,x){return a.concat(x.games);},[]).filter(function(g){return g.status&&g.status.abstractGameState==='Final';});
    if(games.length<3) return null;
    var awayWins=games.filter(function(g){return (g.teams.away.team.id===awayId&&g.teams.away.isWinner)||(g.teams.home.team.id===awayId&&g.teams.home.isWinner);}).length;
    return {awayWins:awayWins,total:games.length,awayPct:awayWins/games.length};
  }).catch(function(){return null;});
}

function fetchCompleted(start,end) {
  return get('/schedule?sportId=1&startDate='+start+'&endDate='+end+'&hydrate=probablePitcher,team,decisions').then(function(d) {
    return (d.dates||[]).reduce(function(a,x){return a.concat(x.games);},[]).filter(function(g){return g.status&&g.status.abstractGameState==='Final';}).map(function(g) {
      return {gamePk:g.gamePk,date:(g.officialDate||g.gameDate||'').slice(0,10),
        away:{id:g.teams.away.team.id,name:g.teams.away.team.name,pitcherId:(g.teams.away.probablePitcher&&g.teams.away.probablePitcher.id)||null,pitcherName:(g.teams.away.probablePitcher&&g.teams.away.probablePitcher.fullName)||'TBD'},
        home:{id:g.teams.home.team.id,name:g.teams.home.team.name,pitcherId:(g.teams.home.probablePitcher&&g.teams.home.probablePitcher.id)||null,pitcherName:(g.teams.home.probablePitcher&&g.teams.home.probablePitcher.fullName)||'TBD'},
        actualWinner:g.teams.home.isWinner?g.teams.home.team.name:g.teams.away.isWinner?g.teams.away.team.name:null};
    }).filter(function(g){return g.actualWinner;});
  });
}

var _cache={};
function cachedStats(id,yr) {
  var k=id+'-'+yr;
  if(_cache[k]) return Promise.resolve(_cache[k]);
  return Promise.all([fetchHitting(id,yr),fetchPitching(id,yr),fetchDefense(id,yr),fetchStandings(id,yr)]).then(function(r) {
    _cache[k]={hit:r[0]||{ba:0.250,obp:0.320,slg:0.415,woba:0.315,babip:0.295},pit:r[1],def:r[2]||{fieldingPct:0.983,errors:80},stand:r[3]||{rdiff:0,pct:0.500}};
    return _cache[k];
  });
}

// ── MODEL ─────────────────────────────────────────────────────────────────────
var AVG_SP={era:4.20,whip:1.30,k9:8.8,bb9:3.2,fip:4.05,xfip:4.00,ipsPerStart:5.0};
var AVG_HIT={ba:0.250,obp:0.320,slg:0.415,woba:0.315,babip:0.295};
var AVG_PITCH={teamEra:4.20,teamWhip:1.28,teamK9:8.5,teamFip:4.05,saves:25,holds:45,blownSaves:10};

function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function sigmoid(lo){return 1/(1+Math.exp(-lo));}

function blendPitch(sp,tp) {
  var S=sp||AVG_SP,T=tp||AVG_PITCH;
  var spInn=clamp(S.ipsPerStart||5.0,3.5,7.0),bpInn=9-spInn;
  var bpEra=clamp((T.teamEra*9-S.era*spInn)/bpInn,2.5,7.5);
  var bpWhip=clamp((T.teamWhip*9-S.whip*spInn)/bpInn,0.9,2.2);
  var bpK9=clamp((T.teamK9*9-S.k9*spInn)/bpInn,5.0,14.0);
  var bpFip=clamp((T.teamFip*9-S.fip*spInn)/bpInn,2.5,7.5);
  var bsv=T.saves+T.blownSaves;
  return {spInn:spInn,bpInn:bpInn,
    starterEra:S.era,starterWhip:S.whip,starterK9:S.k9,starterFip:S.fip,starterXfip:S.xfip,starterBb9:S.bb9,
    bullpenEra:bpEra,bullpenWhip:bpWhip,bullpenFip:bpFip,
    blendedEra:(S.era*spInn+bpEra*bpInn)/9,
    blendedWhip:(S.whip*spInn+bpWhip*bpInn)/9,
    blendedK9:(S.k9*spInn+bpK9*bpInn)/9,
    blendedFip:(S.fip*spInn+bpFip*bpInn)/9,
    bullpenDepth:(T.saves+T.holds)/70,
    svPct:bsv>0?T.saves/bsv:0.70};
}

function mlToDecimal(ml) { var n=parseInt(ml); return n>0?(n/100)+1:(100/Math.abs(n))+1; }
function mlToImplied(ml) { if(!ml) return null; var n=parseInt(ml); if(isNaN(n)) return null; return n>0?100/(n+100):Math.abs(n)/(Math.abs(n)+100); }
function calcEdge(p,bookML) { var bp=mlToImplied(bookML); return bp!==null?p-bp:null; }
function kelly(p,ml,frac) { frac=frac||0.25; var b=mlToDecimal(ml)-1,q=1-p; return Math.max(0,((b*p-q)/b)*frac); }

function runModel(A,B,h2h) {
  var pfB=(PARK[B.name]||100)/100,pfA=(PARK[A.name]||100)/100;
  var aWoba=(A.hit.woba/pfA)*pfB,bWoba=(B.hit.woba/pfA)*pfB;
  var aLuck=(A.hit.babip-0.295)*0.5,bLuck=(B.hit.babip-0.295)*0.5;
  var aDefScore=(A.def.fieldingPct-0.983)*50-(A.def.errors-80)*0.003;
  var bDefScore=(B.def.fieldingPct-0.983)*50-(B.def.errors-80)*0.003;
  var aBpRel=(A.pitch.svPct-0.70)*0.3,bBpRel=(B.pitch.svPct-0.70)*0.3;
  var lo=0;
  lo+=(B.pitch.blendedFip-A.pitch.blendedFip)*0.24;
  lo+=(B.pitch.blendedWhip-A.pitch.blendedWhip)*0.20;
  lo+=(A.pitch.blendedK9-B.pitch.blendedK9)*0.04;
  lo+=(A.pitch.starterBb9-B.pitch.starterBb9)*0.06;
  lo+=aBpRel-bBpRel;
  lo+=(A.pitch.bullpenDepth-B.pitch.bullpenDepth)*0.10;
  lo+=(aWoba-bWoba)*4.2;
  lo+=(A.hit.slg-B.hit.slg)*0.8;
  lo-=(aLuck-bLuck);
  lo+=(aDefScore-bDefScore)*0.08;
  lo-=0.16;
  lo+=(A.stand.rdiff-B.stand.rdiff)*0.005;
  lo+=(A.recent.winPct-B.recent.winPct)*0.50;
  lo+=(A.stand.pct-B.stand.pct)*0.30;
  if(h2h&&h2h.total>=3) lo+=(h2h.awayPct-0.500)*0.20;
  lo+=((PARK[B.name]||100)-100)*0.004;
  var pA=clamp(sigmoid(lo),0.22,0.78),pB=1-pA;
  var ml=function(p){return p>=0.5?'-'+Math.round(p/(1-p)*100):'+'+Math.round((1-p)/p*100);};
  var rA=Math.max(1,Math.round(aWoba*14-B.pitch.blendedFip*0.30));
  var rB=Math.max(1,Math.round(bWoba*14-A.pitch.blendedFip*0.30));
  var winner=pA>=pB?A.name:B.name;
  var factors=[
    {label:'Blended FIP',aVal:A.pitch.blendedFip.toFixed(2),bVal:B.pitch.blendedFip.toFixed(2),delta:(B.pitch.blendedFip-A.pitch.blendedFip)*0.24},
    {label:'Blended WHIP',aVal:A.pitch.blendedWhip.toFixed(2),bVal:B.pitch.blendedWhip.toFixed(2),delta:(B.pitch.blendedWhip-A.pitch.blendedWhip)*0.20},

function buildParlays(results,bookOdds,minEdgePct) {
  bookOdds=bookOdds||{};
  var minEdge=(minEdgePct||2)/100;
  var edgy=results.filter(function(r){return r.winnerP>=0.54;}).map(function(r) {
    var bookML=bookOdds[r.gamePk]||null;
    var edge=bookML?calcEdge(r.winnerP,bookML):null;
    var hasEdge=edge!==null?edge>=minEdge:true;
    var effectiveML=bookML||r.winnerML;
    return Object.assign({},r,{bookML:bookML,edge:edge,hasEdge:hasEdge,effectiveML:effectiveML,kellyPct:kelly(r.winnerP,effectiveML)*100});
  }).filter(function(r){return r.hasEdge;}).sort(function(a,b) {
    var ea=a.edge!==null?a.edge:Math.abs(a.winnerP-0.5)*0.2;
    var eb=b.edge!==null?b.edge:Math.abs(b.winnerP-0.5)*0.2;
    return eb-ea;
  });
  var singles=edgy.slice(0,3).map(function(r){return {legs:[r],type:'Single',combinedP:r.winnerP,payout:mlToDecimal(r.effectiveML),kellyPct:r.kellyPct,combinedEdge:r.edge};});
  var top4=edgy.slice(0,4),parlays2=[];
  for(var i=0;i<top4.length;i++) for(var j=i+1;j<top4.length;j++) {
    var a=top4[i],b=top4[j];
    if(a.gamePk===b.gamePk) continue;
    var combinedP=a.winnerP*b.winnerP;
    var payout=mlToDecimal(a.effectiveML)*mlToDecimal(b.effectiveML);
    var kPct=kelly(combinedP,'+'+Math.round((payout-1)*100))*100;
    var combinedEdge=(a.edge!==null&&b.edge!==null)?(a.edge+b.edge)/2:null;
    parlays2.push({legs:[a,b],type:'2-Leg Parlay',combinedP:combinedP,payout:payout,kellyPct:kPct,combinedEdge:combinedEdge});
  }
  parlays2.sort(function(a,b){var ea=a.combinedEdge!==null?a.combinedEdge:a.combinedP;var eb=b.combinedEdge!==null?b.combinedEdge:b.combinedP;return eb-ea;});
  var parlays3=[];
  var top3=edgy.slice(0,3);
  if(top3.length===3&&top3[0].gamePk!==top3[1].gamePk&&top3[1].gamePk!==top3[2].gamePk&&top3[0].gamePk!==top3[2].gamePk) {
    var cp=top3[0].winnerP*top3[1].winnerP*top3[2].winnerP;
    var pp=mlToDecimal(top3[0].effectiveML)*mlToDecimal(top3[1].effectiveML)*mlToDecimal(top3[2].effectiveML);
    var ce=(top3[0].edge!==null&&top3[1].edge!==null&&top3[2].edge!==null)?(top3[0].edge+top3[1].edge+top3[2].edge)/3:null;
    parlays3.push({legs:top3,type:'3-Leg Parlay',combinedP:cp,payout:pp,kellyPct:kelly(cp,'+'+Math.round((pp-1)*100))*100,combinedEdge:ce});
  }
  return {singles:singles,parlays2:parlays2.slice(0,2),parlays3:parlays3,edgeFiltered:edgy.length};
}

function computeBacktest(results,bankroll) {
  function rec(arr){if(!arr.length)return{w:0,l:0,pct:null};var w=arr.filter(function(r){return r.correct;}).length;return{w:w,l:arr.length-w,pct:(w/arr.length*100).toFixed(1)};}
  var bankSim=bankroll,peak=bankroll,maxDD=0,equity=[bankroll];
  results.forEach(function(r){var k=kelly(r.winnerP,r.winnerML)*bankSim;var gain=r.correct?k*(mlToDecimal(r.winnerML)-1):-k;bankSim=Math.max(1,bankSim+gain);peak=Math.max(peak,bankSim);maxDD=Math.max(maxDD,(peak-bankSim)/peak*100);equity.push(parseFloat(bankSim.toFixed(2)));});
  var buckets=[{label:'54-58%',lo:0.54,hi:0.58},{label:'58-62%',lo:0.58,hi:0.62},{label:'62-66%',lo:0.62,hi:0.66},{label:'66-70%',lo:0.66,hi:0.70},{label:'70%+',lo:0.70,hi:1.00}].map(function(b){
    var gs=results.filter(function(r){return r.winnerP>=b.lo&&r.winnerP<b.hi;});
    var wins=gs.filter(function(r){return r.correct;}).length;
    return {label:b.label,games:gs.length,wins:wins,actualPct:gs.length?(wins/gs.length*100).toFixed(1):null};
  });
  var byDate={};
  results.forEach(function(r){if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r);});
  var p1Bank=bankroll,p2Bank=bankroll,p3Bank=bankroll,p1Eq=[bankroll],p2Eq=[bankroll],p3Eq=[bankroll],parlayDays=[];
  Object.keys(byDate).sort().forEach(function(date){
    var plays=buildParlays(byDate[date]);
    var s=plays.singles[0],p2=plays.parlays2[0],p3=plays.parlays3[0];
    if(s){var k=kelly(s.combinedP,s.legs[0].winnerML)*p1Bank;p1Bank=Math.max(1,p1Bank+(s.legs[0].correct?k*(mlToDecimal(s.legs[0].winnerML)-1):-k));p1Eq.push(parseFloat(p1Bank.toFixed(2)));}
    if(p2){var odds=p2.legs.reduce(function(a,l){return a*mlToDecimal(l.winnerML);},1);var k=kelly(p2.combinedP,'+'+Math.round((odds-1)*100))*p2Bank;p2Bank=Math.max(1,p2Bank+(p2.legs.every(function(l){return l.correct;})?k*(odds-1):-k));p2Eq.push(parseFloat(p2Bank.toFixed(2)));}
    if(p3){var odds=p3.legs.reduce(function(a,l){return a*mlToDecimal(l.winnerML);},1);var k=kelly(p3.combinedP,'+'+Math.round((odds-1)*100))*p3Bank;p3Bank=Math.max(1,p3Bank+(p3.legs.every(function(l){return l.correct;})?k*(odds-1):-k));p3Eq.push(parseFloat(p3Bank.toFixed(2)));}
    parlayDays.push({date:date,
      single:s?{hit:s.legs[0].correct,label:s.legs[0].winner,combinedP:s.combinedP}:null,
      parlay2:p2?{hit:p2.legs.every(function(l){return l.correct;}),label:p2.legs.map(function(l){return l.winner;}).join(' + '),combinedP:p2.combinedP}:null,
      parlay3:p3?{hit:p3.legs.every(function(l){return l.correct;}),label:p3.legs.map(function(l){return l.winner;}).join(' + '),combinedP:p3.combinedP}:null});
  });
  function pRec(days,key){var played=days.filter(function(d){return d[key];});var won=played.filter(function(d){return d[key].hit;});return{w:won.length,l:played.length-won.length,pct:played.length?(won.length/played.length*100).toFixed(1):null,played:played.length};}
  return {all:rec(results),high:rec(results.filter(function(r){return r.confidence==='High';})),medium:rec(results.filter(function(r){return r.confidence==='Medium';})),low:rec(results.filter(function(r){return r.confidence==='Low';})),
    roi:((bankSim-bankroll)/bankroll*100).toFixed(1),finalBank:bankSim.toFixed(0),maxDD:maxDD.toFixed(1),equity:equity,calibration:buckets,bets:results,parlayDays:parlayDays,
    p1Record:pRec(parlayDays,'single'),p2Record:pRec(parlayDays,'parlay2'),p3Record:pRec(parlayDays,'parlay3'),
    p1Bank:p1Bank.toFixed(0),p2Bank:p2Bank.toFixed(0),p3Bank:p3Bank.toFixed(0),
    p1Roi:((p1Bank-bankroll)/bankroll*100).toFixed(1),p2Roi:((p2Bank-bankroll)/bankroll*100).toFixed(1),p3Roi:((p3Bank-bankroll)/bankroll*100).toFixed(1)};
}

function doAnalyze() {

      S.progress='Analyzed '+Math.min(i,gameList.length)+' / '+gameList.length+'...';renderBoard();
      Promise.allSettled(batch.map(function(g){return analyzeGame(g,S.date);})).then(function(res) {
        res.forEach(function(r){if(r.status==='fulfilled')analyzed.push(r.value);});
        next();
      });
    }
    next();
  }).catch(function(e){S.error='Error: '+e.message;S.loading=false;renderBoard();});
}

  });

    html+='<div class="card"><div class="lbl">Game Log ('+bt.bets.length+' games)</div><div style="max-height:300px;overflow-y:auto">';
    bt.bets.slice().reverse().forEach(function(r) {
      html+='<div class="bt-row" style="background:'+(r.correct?'rgba(58,138,90,.06)':'rgba(138,58,58,.06)')+';border:1px solid '+(r.correct?'#1a3a2a':'#3a1a1a')+'"><span style="font-size:9px;color:#2e2416;width:70px;flex-shrink:0;font-family:monospace">'+r.date+'</span><span style="font-size:10px;color:'+(r.correct?'#e0b040':'#888')+';flex:1;font-weight:'+(r.correct?700:400)+'">'+r.winner+'</span><span style="font-size:9px;color:'+(r.correct?'#3a6a3a':'#6a3a3a')+';flex-shrink:0">'+(r.correct?'✓':'✗')+' '+(r.actualWinner?r.actualWinner.split(' ').pop():'')+'</span><span style="font-size:10px;font-family:monospace;color:'+(r.winnerML&&r.winnerML[0]==='+'?'#5aba8a':'#c8b890')+';width:40px;text-align:right;flex-shrink:0">'+r.winnerML+'</span><span style="font-size:9px;color:'+confCol(r.confidence)+';width:34px;text-align:right;flex-shrink:0">'+r.confidence+'</span></div>';
    });
    html+='</div></div>';
  }
  document.getElementById('tab3').innerHTML=html;
  var bsEl=document.getElementById('bt-start');
  var beEl=document.getElementById('bt-end');
  if(bsEl) bsEl.onchange=function(){set('btStart',this.value);};
  if(beEl) beEl.onchange=function(){set('btEnd',this.value);};
  var btBtn=document.getElementById('bt-btn');
  if(btBtn) btBtn.onclick=doBacktest;
}

function doBacktest() {
  S.btLoading=true;S.btError='';S.btResults=null;S.btProgress='Fetching completed games...';renderBacktest();
  var yr=S.btEnd.slice(0,4);
  fetchCompleted(S.btStart,S.btEnd).then(function(games) {
    if(!games.length){S.btError='No completed games found.';S.btLoading=false;renderBacktest();return;}
    var analyzed=[],i=0;
    function next() {
      if(i>=games.length){
        S.btLoading=false;
        if(!analyzed.length){S.btError='Could not analyze games — try a shorter range or check your internet connection.';renderBacktest();return;}
        try{S.btResults=computeBacktest(analyzed,S.bankroll);}catch(e){S.btError='Compute error: '+e.message;renderBacktest();return;}
        renderBacktest();return;
      }
      var batch=games.slice(i,i+4);i+=4;
      S.btProgress='Analyzed '+Math.min(i,games.length)+' / '+games.length+'...';renderBacktest();
      Promise.allSettled(batch.map(function(g){return analyzeGameCached(g,yr);})).then(function(res) {
        res.forEach(function(r){if(r.status==='fulfilled')analyzed.push(r.value);});
        next();
      });
    }
    next();
  }).catch(function(e){S.btError='Error: '+e.message;S.btLoading=false;renderBacktest();});
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderBoard();
</script>
